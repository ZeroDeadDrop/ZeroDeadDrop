      },

      getTabContent(t) {
        if (t === 'overview') return `<div class="space-y-6"><div class="text-2xl font-bold mb-4 text-center" style="color:var(--header-color)">What is ZeroDeadDrop?</div><div class="p-4 rounded-xl" style="background:var(--info-bg);border:2px solid var(--info-border)"><p class="text-sm mb-3"><strong>Simple Explanation:</strong> ZeroDeadDrop encrypts your files entirely in your browser using military-grade encryption (AES-256-GCM). It creates three separate pieces: encrypted data, instructions, and a credential (passphrase or private key). All three are needed to decrypt.</p></div><div class="text-lg font-bold mb-4">Three-Component Security Architecture</div><div class="grid grid-cols-3 gap-4"><div class="text-center p-4 rounded-xl" style="background:var(--list-bg);border:2px solid #3b82f6"><div style="font-size:2rem;margin-bottom:0.5rem">🔒</div><h5 class="font-bold mb-2 text-sm">1. Encrypted Bundle</h5><p class="text-xs" style="color:var(--text-muted)">Your data scrambled with AES-256-GCM encryption (.json file)</p></div><div class="text-center p-4 rounded-xl" style="background:var(--list-bg);border:2px solid #14b8a6"><div style="font-size:2rem;margin-bottom:0.5rem">📋</div><h5 class="font-bold mb-2 text-sm">2. Manifest</h5><p class="text-xs" style="color:var(--text-muted)">Instructions on how to reassemble the encrypted data</p></div><div class="text-center p-4 rounded-xl" style="background:var(--list-bg);border:2px solid #ef4444"><div style="font-size:2rem;margin-bottom:0.5rem">🔑</div><h5 class="font-bold mb-2 text-sm">3. Credential</h5><p class="text-xs" style="color:var(--text-muted)">Symmetric: passphrase<br>Asymmetric: private key + forward secrecy</p></div></div><div class="p-4 rounded-xl" style="background:var(--error-bg);border:2px solid var(--error-border)"><p class="text-center font-bold text-sm" style="color:var(--text-color)">⚠️ CRITICAL: You need ALL THREE pieces. Lose any one = lose your data permanently.</p></div><div class="text-lg font-bold mb-4">What "Zero" Means</div><div class="grid grid-cols-2 gap-4"><div class="p-4 rounded-xl" style="background:var(--list-bg);border-left:4px solid var(--security-green)"><div class="font-bold mb-2 text-sm">Zero Servers</div><p class="text-xs" style="color:var(--text-muted)">Everything happens in your browser. No backend, no cloud, no uploads. This HTML file is the entire application.</p></div><div class="p-4 rounded-xl" style="background:var(--list-bg);border-left:4px solid var(--security-green)"><div class="font-bold mb-2 text-sm">Zero Knowledge</div><p class="text-xs" style="color:var(--text-muted)">Developers literally cannot access your data. There's no backend to access, no logs, nothing.</p></div><div class="p-4 rounded-xl" style="background:var(--list-bg);border-left:4px solid var(--security-green)"><div class="font-bold mb-2 text-sm">Zero Data Collection</div><p class="text-xs" style="color:var(--text-muted)">No analytics, cookies, or telemetry. ZeroDeadDrop doesn't know who uses this or what you encrypt.</p></div><div class="p-4 rounded-xl" style="background:var(--list-bg);border-left:4px solid var(--security-green)"><div class="font-bold mb-2 text-sm">Zero Dependencies</div><p class="text-xs" style="color:var(--text-muted)">One self-contained HTML file. No external libraries or frameworks. Works offline.</p></div></div><div class="text-lg font-bold mb-4">Encryption Details</div><div class="p-4 rounded-xl" style="background:var(--list-bg)"><h6 class="font-bold mb-2 text-sm">Technical Specifications:</h6><ul class="list-disc pl-6 text-xs space-y-1" style="color:var(--text-muted)"><li><strong>AES-256-GCM:</strong> 256-bit Advanced Encryption Standard in Galois/Counter Mode</li><li><strong>Symmetric Mode:</strong> PBKDF2 with 300,000+ iterations, SHA-256/512 hash</li><li><strong>Asymmetric Mode:</strong> ECDH (Elliptic Curve Diffie-Hellman) with P-384 curve for forward secrecy, now supporting multiple recipients</li><li><strong>Random Salts:</strong> Unique 16-byte salt per encryption prevents rainbow table attacks (symmetric only)</li><li><strong>Random IVs:</strong> Unique 12-byte initialization vector per chunk</li><li><strong>Web Crypto API:</strong> Browser's native cryptography (not JavaScript implementations)</li><li><strong>Secure Memory Sanitization:</strong> 180MB constant memory pressure + 5-pass wipe on exit prevents RAM recovery</li></ul></div><div class="text-lg font-bold mb-4">Works Completely Offline</div><div class="p-4 rounded-xl" style="background:var(--info-bg);border:2px solid var(--info-border)"><h5 class="font-bold mb-2 text-sm" style="color:var(--text-color)">No Internet Required:</h5><ul class="list-disc pl-6 text-xs space-y-1" style="color:var(--text-color)"><li>Save this HTML file to your computer</li><li>Open with any modern browser - works without internet</li><li>Encrypt and decrypt files on air-gapped systems</li><li>Perfect for maximum security environments</li><li>Share this HTML file itself for secure communication</li></ul></div></div>`;
        if (t === 'asymmetric-guide') return `<div class="space-y-6"><div class="text-2xl font-bold mb-4 text-center" style="color:var(--header-color)">Asymmetric Mode — Forward-Secret Public Key Encryption</div><div class="p-4 rounded-xl" style="background:var(--security-green);color:white"><p class="font-bold text-center text-lg">This is the recommended mode — strictly superior to passphrase sharing in every way.</p></div><div class="text-lg font-bold mb-4">New Feature: Multiple Recipients</div><p class="text-sm mb-4">You can now encrypt for multiple recipients simultaneously. Toggle "Multiple Recipients" in the encryption panel to reveal dynamic fields. Add as many public keys as needed using the "+" button. Each recipient can decrypt independently using their private key.</p><div class="text-lg font-bold mb-4">The Simple Analogy</div><p class="text-sm mb-4">Think of asymmetric encryption like a <strong>mailbox with two keys</strong>:</p><div class="grid grid-cols-2 gap-4 mb-4"><div class="p-4 rounded-xl text-center" style="background:var(--list-bg);border:2px solid #3b82f6"><div style="font-size:2rem;margin-bottom:0.5rem">📮</div><p class="font-bold mb-2 text-sm">Public Key = The mail slot</p><p class="text-xs">Anyone can DROP mail in, but can't READ what's inside</p></div><div class="p-4 rounded-xl text-center" style="background:var(--list-bg);border:2px solid #ef4444"><div style="font-size:2rem;margin-bottom:0.5rem">🔒</div><p class="font-bold mb-2 text-sm">Private Key = The mailbox key</p><p class="text-xs">Only YOU can OPEN and READ the mail</p></div></div><p class="text-sm font-bold mb-4">Key insight: You can give everyone your "mail slot" (public key), and they can send you encrypted messages. Only you can read them with your "mailbox key" (private key).</p><div class="text-lg font-bold mb-4">👥 Who Does What?</div><div class="grid grid-cols-2 gap-4"><div class="p-4 rounded-xl" style="background:var(--list-bg);border-left:4px solid var(--security-green)"><h5 class="font-bold mb-2 text-sm">RECEIVER (You want to receive encrypted files)</h5><p class="text-xs mb-2">Do this <strong>ONCE</strong>, keep forever:</p><ol class="list-decimal pl-6 text-xs space-y-1"><li>Click "Generate Asymmetric Keypair" button</li><li>You get TWO keys:<ul class="list-disc pl-6 text-xs mt-1 space-y-1"><li><strong>Public Key</strong> — Share this with EVERYONE who will send you files</li><li><strong>Private Key</strong> — NEVER share this, save it in a password manager</li></ul></li></ol><p class="text-xs mt-4 font-bold">That's it! You're done. Anyone can now send you encrypted files.</p></div><div class="p-4 rounded-xl" style="background:var(--list-bg);border-left:4px solid #3b82f6"><h5 class="font-bold mb-2 text-sm">SENDER (You want to send encrypted files)</h5><ol class="list-decimal pl-6 text-xs space-y-1"><li>Ask the receiver: "Hey, what's your public key?"</li><li>Paste their public key</li><li>Check "Asymmetric Mode"</li><li>Encrypt files</li><li>Send Bundle + Manifest (any channel)</li><li><strong>NO PASSPHRASE TO SHARE!</strong></li></ol></div></div><div class="text-lg font-bold mb-4">📖 Step-by-Step Example</div><p class="text-sm mb-4"><strong>Scenario: Alice wants to send Bob a confidential document</strong></p><div class="space-y-4"><div class="p-4 rounded-xl" style="background:var(--list-bg);border:2px solid var(--security-green)"><h6 class="font-bold mb-2 text-sm">STEP 1: Bob (Receiver) — One-Time Setup</h6><p class="text-xs mb-2">Bob generates keypair:</p><div class="grid grid-cols-2 gap-4"><div class="p-2 rounded" style="background:var(--card-bg);border:1px solid var(--border-color)"><strong>Public Key (share with Alice):</strong><pre>MIGbMBAGByqGSM49AgEGBSuBBAAjA4GGAAQBxY7+2cF...</pre></div><div class="p-2 rounded" style="background:var(--card-bg);border:1px solid var(--border-color)"><strong>Private Key (save securely):</strong><pre>MIG2AgEAMBAGByqGSM49AgEGBSuBBAAjBIGeMIGbAg...</pre></div></div></div><div class="p-4 rounded-xl" style="background:var(--list-bg);border:2px solid #3b82f6"><h6 class="font-bold mb-2 text-sm">STEP 2: Alice (Sender) — Encrypts</h6><ol class="list-decimal pl-6 text-xs space-y-1"><li>Uploads file</li><li>Checks Asymmetric Mode</li><li>Pastes Bob's public key</li><li>Clicks Start Encryption</li></ol><p class="text-xs mt-2">Creates zd_bundle.json + zd_manifest.json</p></div><div class="p-4 rounded-xl" style="background:var(--list-bg);border:2px solid #14b8a6"><h6 class="font-bold mb-2 text-sm">STEP 3: Bob (Receiver) — Decrypts</h6><ol class="list-decimal pl-6 text-xs space-y-1"><li>Imports Bundle + Manifest</li><li>Pastes his private key</li><li>Clicks Start Decryption</li><li>Downloads file</li></ol></div></div><div class="text-lg font-bold mb-4">🔬 Behind the Scenes (ECDH Magic)</div><div class="grid grid-cols-2 gap-4"><div class="p-4 rounded-xl" style="background:var(--list-bg)"><h6 class="font-bold mb-2 text-sm">Encryption (Sender)</h6><ul class="list-disc pl-6 text-xs space-y-1"><li>Generates temporary keypair</li><li>Combines with receiver's public key → shared secret</li><li>Encrypts file</li><li><strong>Wipes temporary private key</strong> (forward secrecy)</li></ul></div><div class="p-4 rounded-xl" style="background:var(--list-bg)"><h6 class="font-bold mb-2 text-sm">Decryption (Receiver)</h6><ul class="list-disc pl-6 text-xs space-y-1"><li>Combines own private key with sender's temporary public key (from manifest)</li><li>Recreates same shared secret</li><li>Decrypts file</li></ul></div></div><div class="text-lg font-bold mb-4">About the "Sender Public Key" Shown During Decryption</div><p class="text-sm">When you import a manifest and decrypt in asymmetric mode, you will see a "Sender Public Key" with a copy button.</p><ul class="list-disc pl-6 text-xs space-y-1"><li>This is a <strong>temporary key created by the sender just for this message</strong>. It adds "forward secrecy" – extra protection so that even if someone steals your private key later, they can't l><div class="p-4 rounded-xl" style="background:var(--error-bg);border:2px solid var(--error-border)"><h4 class="font-bold mb-2 text-sm" style="color:var(--text-color)">⚠️ CRITICAL: Automatic Secure Purge</h4><p class="text-xs" style="color:var(--text-color)">After successful decryption, all data is automatically purged from memory after 5 minutes of inactivity. The purge uses military-grade 5-pass memory wiping that makes RAM recovery nearly impossible. Download your files immediately!</p></div><div class="text-lg font-bold mb-4">Troubleshooting</div><div class="space-y-4"><div class="p-4 rounded-xl" style="background:var(--list-bg)"><h5 class="font-bold mb-2 text-sm">"Incorrect passphrase or corrupted data"</h5><ul class="list-disc pl-6 text-xs space-y-1" style="color:var(--text-muted)"><li>Double-check the passphrase/private key (case-sensitive)</li><li>Verify you have the correct manifest and bundle</li><li>Ensure JSON files aren't corrupted</li><li>For asymmetric: make sure you're using YOUR private key (not sender's public key)</li></ul></div><div class="p-4 rounded-xl" style="background:var(--list-bg)"><h5 class="font-bold mb-2 text-sm">"Missing chunk metadata"</h5><ul class="list-disc pl-6 text-xs space-y-1" style="color:var(--text-muted)"><li>The manifest and bundle don't match</li><li>Get the correct pair from sender</li></ul></div><div class="p-4 rounded-xl" style="background:var(--list-bg)"><h5 class="font-bold mb-2 text-sm">"Out of memory"</h5><ul class="list-disc pl-6 text-xs space-y-1" style="color:var(--text-muted)"><li>Close other browser tabs</li><li>Use desktop browser instead of mobile</li><li>Ask sender to split large files</li></ul></div></div></div>`;

r generates ephemeral ECDH keypair</li><li>Derives shared AES-256 key using sender's ephemeral private key + receiver's public key</li><li>Ephemeral private key is destroyed immediately after encryption (forward secrecy)</li><li>Only receiver can decrypt (using their private key + sender's ephemeral public key from manifest)</li></ul><div class="text-lg font-bold mb-4">3. Chunk Encryption</div><ul class="list-disc pl-6 text-xs space-y-2"><li>Each chunk is encrypted with AES-256-GCM using a unique IV.</li><li>Symmetric mode also uses unique salt per chunk</li><li>Since it is randomized for every chunk, no output is the same even if uploading the same files with the same password.</li></ul><div class="text-lg font-bold mb-4">4. Metadata Encryption</div><ul class="list-disc pl-6 text-xs space-y-2"><li>File names and types are encrypted separately.</li></ul><div class="text-lg font-bold mb-4">5. Output Generation</div><ul class="list-disc pl-6 text-xs space-y-2"><li>Bundle: JSON of all encrypted chunks (auto-split into parts for large data).</li><li>Manifest: JSON with reassembly info (includes sender's ephemeral public key for asymmetric mode).</li><li>Combined: Optional single JSON (not for batched).</li><li>Note: Processing large files (e.g., approaching 1GB) or multiple large files simultaneously may cause the browser to appear frozen temporarily—please wait, as the operation will complete eventually. For optimal performance, it is recommended to encrypt multiple large files separately.</li></ul><div class="text-lg font-bold mb-4">6. Secure Memory Sanitization</div><ul class="list-disc pl-6 text-xs space-y-2"><li>180MB of random data is kept in memory to prevent OS from paging sensitive data to disk/swap</li><li>On exit (close, refresh, or crash), all memory is wiped with 5-pass overwrite (0xAA → 0x55 → 0x00 → 0xFF → 0x00)</li><li>Final 250MB allocation + wipe ensures every accessible memory page is overwritten</li><li>Page is forcefully crashed to about:blank to prevent any recovery</li></ul><div class="text-lg font-bold mb-4">Advanced Settings Explanation</div><p class="text-xs" style="color:var(--text-color)">In the advanced settings, you can customize PBKDF2 iterations and the hash algorithm (symmetric mode only). Iterations determine how many times the passphrase is hashed to derive the key—higher values (e.g., 1,000,000 or more) increase security against brute-force attacks but slow down encryption/decryption. A reasonable maximum is around 10,000,000, depending on your device's processing power; excessive values may cause timeouts or high CPU usage. The hash algorithm can be SHA-256 (standard and efficient) or SHA-512 (slightly more secure with longer digests). For asymmetric mode, the P-384 curve provides excellent security with good performance.</p><div class="p-4 rounded-xl" style="background:var(--error-bg);border:2px solid var(--error-border)"><p class="text-center font-bold text-xs" style="color:var(--text-color)">This app has not been audited. Use for non-critical data only.</p></div></div>`;

      ensureAriaLabels() {
        try {
          const controls = document.querySelectorAll('input, textarea, select');
          controls.forEach((el) => {
            if (!el) return;
            
            if (!el.id) {
              el.id = 'auto-id-' + Math.floor(CryptoRNG.get() * 1000000000);
            }
            
            if (!el.getAttribute('aria-label')) {
              const label = document.querySelector(`label[for="${el.id}"]`);
              const labelText = label ? label.textContent.trim() : (el.placeholder || el.name || el.id || 'input');
              el.setAttribute('aria-label', labelText);
            }
          });
        } catch (e) {}
      },

      setupWidgetListeners() {
        
        ['instructions', 'decoyHarness', 'hiddenVolume', 'ageLite'].forEach(widgetId => {
          const widget = document.getElementById(`widget-${widgetId}`);
          if (widget) {
            widget.addEventListener('click', (e) => {
              if (e.target === widget) this.closeWidget(widgetId);
            });
          }
        });
        
        
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            const widgets = ['instructions', 'decoyHarness', 'hiddenVolume', 'ageLite'];
            for (const widgetId of widgets) {
              const widget = document.getElementById(`widget-${widgetId}`);
              if (widget && !widget.classList.contains('hidden')) {
                this.closeWidget(widgetId);
                break; 
              }
            }
          }
        });
      },

      openWidget(widgetId) {
        const widget = document.getElementById(`widget-${widgetId}`);
        if (widget) {
          widget.classList.remove('hidden');
          
          if (widgetId === 'hiddenVolume') {
            try { this.reattachDecoyListeners(true); } catch(e) { dbg('Rebind hidden volume listeners failed', e); }
            try { this.renderExeStubUI(); } catch(e) { dbg('Render EXE stub UI failed', e); }
          }
          
          
          if (widgetId === 'instructions') {
            const widgetContent = document.getElementById('instructions-widget-content');
            const originalInstr = document.getElementById('instructionsContent');
            if (widgetContent && originalInstr) {
              
              widgetContent.innerHTML = '';
              widgetContent.appendChild(originalInstr);
              
              if (!this.s.activeTab) this.s.activeTab = 'overview';
              
              this.renderInstr();
            }
          }
          
          
          try { this.ensureAriaLabels(); } catch(e) {}
        }
      },

      closeWidget(widgetId) {
        const widget = document.getElementById(`widget-${widgetId}`);
        if (widget) {
          widget.classList.add('hidden');
          
          
          if (widgetId === 'instructions') {
            const originalModal = document.getElementById('instructionsModal');
            const originalModalContent = originalModal?.querySelector('.modal-content');
            const instructionsContent = document.getElementById('instructionsContent');
            if (originalModalContent && instructionsContent && !originalModalContent.contains(instructionsContent)) {
              originalModalContent.appendChild(instructionsContent);
            }
          }
        }
      },

      reattachDecoyListeners(force = false) {
        
        
        if (this.s.listenersAttached && !force) {
          return;
        }
        this.s.listenersAttached = true;
        
        try {
          const addDecoyButtonListener = (btnId, handler) => {
            const btn = document.getElementById(btnId);
            if (btn) {
              
              const newBtn = btn.cloneNode(true);
              btn.parentNode.replaceChild(newBtn, btn);
              const button = document.getElementById(btnId);
              button.addEventListener('click', handler);
              button.addEventListener('keydown', (ev) => { 
                if (ev.key === 'Enter' || ev.key === ' ') { 
                  ev.preventDefault(); 
                  button.click(); 
                } 
              });
            }
          };

          addDecoyButtonListener('btn-video-decoy', () => this.runVideoDecoyTest());
          addDecoyButtonListener('btn-image-decoy', () => this.runImageDecoyTest());
          addDecoyButtonListener('btn-text-decoy', () => this.runTextDecoyTest());
          addDecoyButtonListener('btn-json-decoy', () => this.runJsonDecoyTest());
          addDecoyButtonListener('btn-pdf-decoy', () => this.runPdfDecoyTest());
          addDecoyButtonListener('btn-audio-decoy', () => this.runAudioDecoyTest());
          addDecoyButtonListener('btn-zip-decoy', () => this.runZipDecoyTest());
          addDecoyButtonListener('btn-html-decoy', () => this.runHtmlDecoyTest());
          addDecoyButtonListener('btn-exe-decoy', () => this.runExeDecoyTest());
          addDecoyButtonListener('btn-runall', () => this.runAllDecoyTests());
          addDecoyButtonListener('btn-generate-decoy-pass', () => this.generateDecoyPasswordForTest());
          addDecoyButtonListener('btn-generate-real-pass', () => this.generateRealPasswordForTest());
          addDecoyButtonListener('btn-test-hidden-volume', () => this.testHiddenVolumeGeneration());
          
          
          const customFileInput = document.getElementById('custom-decoy-file');
          const customContentInput = document.getElementById('custom-decoy-content');
          const hvUpload = document.getElementById('hidden-volume-upload');
          
          if (customFileInput) {
            customFileInput.addEventListener('change', (e) => {
              const files = e.target.files;
              const info = document.getElementById('custom-file-info');
              const list = document.getElementById('custom-file-list');
              const items = document.getElementById('custom-file-items');
              
              if (files.length > 0) {
                const totalSize = Array.from(files).reduce((sum, f) => sum + f.size, 0);
                if (info) info.textContent = `${files.length} file${files.length > 1 ? 's' : ''} selected (${this.fmtB(totalSize)} total)`;
                
                if (list && items) {
                  list.style.display = 'block';
                  items.innerHTML = '';
                  Array.from(files).forEach((file) => {
                    const fileDiv = document.createElement('div');
                    fileDiv.style.cssText = 'font-size:11px;color:var(--text-color);padding:.2rem;';
                    fileDiv.textContent = `${file.name} (${this.fmtB(file.size)})`;
                    items.appendChild(fileDiv);
                  });
                }
              } else {
                if (info) info.textContent = 'No files selected';
                if (list) list.style.display = 'none';
              }
            });
          }
          
          if (customContentInput) {
            customContentInput.addEventListener('input', () => {
              const info = document.getElementById('custom-content-info');
              if (info) {
                const size = new TextEncoder().encode(customContentInput.value || '').length;
                info.textContent = `Content size: ${this.fmtB(size)}`;
              }
            });
          }
          
          if (hvUpload) {
            
            try {
              const hvInfo = document.getElementById('hidden-volume-file-info');
              const hvListDiv = document.getElementById('hidden-volume-file-list');
              const hvItemsDiv = document.getElementById('hidden-volume-file-items');
              
              const oldHv = document.getElementById('hidden-volume-upload');
              if (oldHv && oldHv.parentNode) {
                const newHv = oldHv.cloneNode(true);
                oldHv.parentNode.replaceChild(newHv, oldHv);
              }
              const boundHv = document.getElementById('hidden-volume-upload');
              if (!this.s.hiddenVolumeFiles) this.s.hiddenVolumeFiles = [];

              const renderHVFiles = () => {
                const files = this.s.hiddenVolumeFiles || [];
                if (hvInfo) {
                  if (files.length > 0) {
                    const totalSize = files.reduce((sum, f) => sum + f.size, 0);
                    hvInfo.textContent = `${files.length} file${files.length > 1 ? 's' : ''} uploaded (${this.fmtB(totalSize)} total)`;
                  } else {
                    hvInfo.textContent = 'No files uploaded - will generate sample data';
                  }
                }
                if (hvListDiv && hvItemsDiv) {
                  if (files.length > 0) {
                    hvListDiv.style.display = 'block';
                    hvItemsDiv.innerHTML = '';
                    files.forEach((file, index) => {
                      const fileItem = document.createElement('div');
                      fileItem.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:.25rem .5rem;background:var(--card-bg);border:1px solid var(--border-color);border-radius:4px;font-size:11px;';
                      const fileText = document.createElement('span');
                      fileText.textContent = `${file.name} (${this.fmtB(file.size)})`;
                      fileText.style.cssText = 'flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
                      const removeBtn = document.createElement('button');
                      removeBtn.textContent = '✖ Remove'; removeBtn.type = 'button';
                      removeBtn.id = 'remove-hv-file-' + index;
                      removeBtn.setAttribute('aria-label', 'Remove ' + file.name);
                      removeBtn.style.cssText = 'background:#dc2626;color:white;border:none;border-radius:4px;padding:.3rem .6rem;cursor:pointer;font-size:11px;font-weight:600;margin-left:.5rem;white-space:nowrap;transition:background .2s;';
                      removeBtn.onmouseover = () => { removeBtn.style.background = '#b91c1c'; };
                      removeBtn.onmouseout = () => { removeBtn.style.background = '#dc2626'; };
                      removeBtn.onclick = () => { this.s.hiddenVolumeFiles.splice(index, 1); renderHVFiles(); };
                      fileItem.appendChild(fileText);
                      fileItem.appendChild(removeBtn);
                      hvItemsDiv.appendChild(fileItem);
                    });
                  } else {
                    hvItemsDiv.innerHTML = '';
                    hvListDiv.style.display = 'none';
                  }
                }
              };

              if (boundHv) boundHv.addEventListener('change', (ev) => {
                try {
                  const sel = Array.from(boundHv.files || []);
                  for (const f of sel) {
                    const exists = (this.s.hiddenVolumeFiles || []).some(x => x.name === f.name && x.size === f.size && x.lastModified === f.lastModified);
                    if (!exists) this.s.hiddenVolumeFiles.push(f);
                  }
                  try { boundHv.value = ''; } catch (e) {}
                  renderHVFiles();
                } catch (e) { dbg('hidden-volume-upload rebind failed', e); }
              });

              
              renderHVFiles();
            } catch (e) {
              dbg('Failed to bind hidden volume upload handler', e);
            }
          }
        } catch (e) {
          dbg('reattachDecoyListeners', e);
        }
      },

      async deriveStreamingKey(password, salt, purpose = "aes", keyUsages = ["encrypt", "decrypt"]) {
        const enc = new TextEncoder();
        // Append the purpose string to the salt so AES and HMAC derivations use
        // completely different PBKDF2 inputs and cannot share key material.
        const purposeBytes = enc.encode(purpose);
        const purposeSalt = new Uint8Array(salt.length + purposeBytes.length);
        purposeSalt.set(salt);
        purposeSalt.set(purposeBytes, salt.length);

        const keyMaterial = await crypto.subtle.importKey(
          "raw",
          enc.encode(password),
          { name: "PBKDF2" },
          false,
          ["deriveBits", "deriveKey"]
        );

        const params = {
          name: "PBKDF2",
          salt: purposeSalt,
          iterations: 800000,
          hash: "SHA-256"
        };

        if (purpose === "hmac") {
          return crypto.subtle.deriveKey(
            params,
            keyMaterial,
            { name: "HMAC", hash: "SHA-384", length: 384 },
            true,
            ["sign", "verify"]
          );
        }

        return crypto.subtle.deriveKey(
          params,
          keyMaterial,
          { name: "AES-GCM", length: 256 },
          true,
          keyUsages
        );
      },

      
      async encryptStream(
        sourceStream,           
        password,               
        targetWritable          
      ) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const aesKey = await this.deriveStreamingKey(password, salt);
        const hmacKey = await this.deriveStreamingKey(password, salt, "hmac");

        const writer = targetWritable.getWriter();

        
        const headerPayloadWithoutHmac = { v: 1, salt: btoa(String.fromCharCode(...salt)), chunkSize: this.streamingChunkSize };
        const payloadForSignature = JSON.stringify(headerPayloadWithoutHmac);
        const hmac = await crypto.subtle.sign("HMAC", hmacKey, new TextEncoder().encode(payloadForSignature));
        
        headerPayloadWithoutHmac.hmac = btoa(String.fromCharCode(...new Uint8Array(hmac)));
        const header = new TextEncoder().encode(JSON.stringify(headerPayloadWithoutHmac) + "\n");
        await writer.write(header);

        let seq = 0n;
        const iv = new Uint8Array(12);

        try {
          for await (const chunk of sourceStream) {
            crypto.getRandomValues(iv);

            const aad = new Uint8Array(9);
            new DataView(aad.buffer).setBigUint64(0, seq, false);
            aad[8] = 0;

            const encrypted = await crypto.subtle.encrypt(
              { name: "AES-GCM", iv, tagLength: 128, additionalData: aad },
              aesKey,
              chunk
            );

            // Write a copy of iv so that crypto.getRandomValues(iv) on the next
            // iteration cannot corrupt bytes already handed to the writer sink.
            await writer.write(iv.slice());
            const lenBuf = new ArrayBuffer(4);
            new DataView(lenBuf).setUint32(0, encrypted.byteLength, false);
            await writer.write(new Uint8Array(lenBuf));
            await writer.write(new Uint8Array(encrypted));

            seq++;
          }

          
          crypto.getRandomValues(iv);
          const aadLast = new Uint8Array(9);
          new DataView(aadLast.buffer).setBigUint64(0, seq, false);
          aadLast[8] = 1;

          const finalEncrypted = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv, tagLength: 128, additionalData: aadLast },
            aesKey,
            new Uint8Array(0)
          );

          await writer.write(iv);
          const lenBuf = new ArrayBuffer(4);
          new DataView(lenBuf).setUint32(0, 0xFFFFFFFF, false);
          await writer.write(new Uint8Array(lenBuf));
          await writer.write(new Uint8Array(finalEncrypted));

          await writer.close();
        } catch (err) {
          await writer.abort(err);
          throw err;
        } finally {
          
          salt.fill(0);
          iv.fill(0);
        }
      },

      
      async decryptStream(
        sourceStream,           
        password,               
        targetWritable          
      ) {

        const writer = targetWritable.getWriter();
        let buffer = new Uint8Array();
        try {
          
          let headerEnd = -1;
          while (headerEnd === -1) {
            const { value, done } = await reader.read();
            if (done) throw new Error("Premature end of stream");
            buffer = this.concatBuffers(buffer, value);
            headerEnd = buffer.indexOf(10);
          }
          const headerStr = new TextDecoder().decode(buffer.subarray(0, headerEnd));
          const header = JSON.parse(headerStr);
          buffer = buffer.subarray(headerEnd + 1);
          
          
          if (!header.hmac) {
            throw new Error("Missing HMAC in header - possible corruption");
          }
          
          const salt = Uint8Array.from(atob(header.salt), c => c.charCodeAt(0));
          const aesKey = await this.deriveStreamingKey(password, salt);
          const hmacKey = await this.deriveStreamingKey(password, salt, "hmac");
          
          
          const payloadForVerification = { v: header.v, salt: header.salt, chunkSize: header.chunkSize };
          const payloadStrForVerification = JSON.stringify(payloadForVerification);
          const expectedHmac = await crypto.subtle.sign("HMAC", hmacKey, new TextEncoder().encode(payloadStrForVerification));
          
          if (!this.constantTimeEqual(new Uint8Array(expectedHmac), Uint8Array.from(atob(header.hmac), c => c.charCodeAt(0)))) {

          }
          let seq = 0n;
          while (true) {
            const { result: iv, buffer: newBuffer } = await this.readExact(reader, buffer, 12);
            buffer = newBuffer;
            const { result: lenBuf, buffer: newBuffer2 } = await this.readExact(reader, buffer, 4);
            buffer = newBuffer2;
            // lenBuf is a subarray view — must use byteOffset so DataView reads
            // the correct 4 bytes rather than position 0 of the backing buffer.
            const len = new DataView(lenBuf.buffer, lenBuf.byteOffset, lenBuf.byteLength).getUint32(0, false);
            
            if (len === 0xFFFFFFFF) {
              const { result: ciphertext, buffer: newBuffer3 } = await this.readExact(reader, buffer, 16);
              buffer = newBuffer3;
              
              const aadLast = new Uint8Array(9);
              new DataView(aadLast.buffer).setBigUint64(0, seq, false);
              aadLast[8] = 1;
              
              await crypto.subtle.decrypt(
                { name: "AES-GCM", iv, tagLength: 128, additionalData: aadLast },
                aesKey,
                ciphertext
              );
              
              await writer.close();

            }
            
            const { result: ciphertext, buffer: newBuffer3 } = await this.readExact(reader, buffer, len);
            buffer = newBuffer3;
            
            const aad = new Uint8Array(9);
            new DataView(aad.buffer).setBigUint64(0, seq, false);
            aad[8] = 0;
            
            const plaintext = await crypto.subtle.decrypt(
              { name: "AES-GCM", iv, tagLength: 128, additionalData: aad },
              aesKey,
              ciphertext
            );
            
            await writer.write(new Uint8Array(plaintext));
            seq++;
          }
        } catch (err) {
          await writer.abort(err);
          throw err;
        } finally {
          reader.releaseLock();
          await writer.close().catch(() => {});
        }
      },

    
      concatBuffers(a, b) {
        const res = new Uint8Array(a.length + b.length);
        res.set(a);
        res.set(b, a.length);
        return res;
      },

      constantTimeEqual(a, b) {
        if (a.length !== b.length) return false;
        let result = 0;
        for (let i = 0; i < a.length; i++) {
          result |= a[i] ^ b[i];
        }
        return result === 0;
      },

      async readExact(reader, buffer, count) {
        while (buffer.length < count) {
          const { value, done } = await reader.read();
          if (done) throw new Error("Premature end");
          buffer = this.concatBuffers(buffer, value);
        }
        const result = buffer.subarray(0, count);
        const newBuffer = buffer.subarray(count);
        return { result, buffer: newBuffer };
      },

    const originalCreateElement = document.createElement;
    document.createElement = function(tagName) {
      const element = originalCreateElement.call(this, tagName);
      
      
      if (tagName.toLowerCase() === 'input') {
        
        setTimeout(() => {
          if (!element.id && !element.name) {
            const timestamp = Date.now();
            const random = Math.floor(CryptoRNG.get() * 100000);
            element.id = `auto-input-${timestamp}-${random}`;
            element.name = `auto-input-${timestamp}-${random}`;
            
          }
        }, 0);
      }
      
      return element;
    };
    
    
    const originalIframeContentDocument = Object.getOwnPropertyDescriptor(HTMLIFrameElement.prototype, 'contentDocument');
    if (originalIframeContentDocument && originalIframeContentDocument.get) {
      Object.defineProperty(HTMLIFrameElement.prototype, 'contentDocument', {
        get: function() {
          const doc = originalIframeContentDocument.get.call(this);
          if (doc && !doc._inputFixed) {
            const originalDocCreateElement = doc.createElement;
            doc.createElement = function(tagName) {
              const element = originalDocCreateElement.call(this, tagName);
              if (tagName.toLowerCase() === 'input') {
                setTimeout(() => {
                  if (!element.id && !element.name) {
                    const timestamp = Date.now();
                    const random = Math.floor(CryptoRNG.get() * 100000);
                    element.id = `auto-iframe-input-${timestamp}-${random}`;
                    element.name = `auto-iframe-input-${timestamp}-${random}`;
                    
                  }
                }, 0);
              }
              return element;
            };
            doc._inputFixed = true;
          }
          return doc;
        }
      });
    }
    
    
    const globalPdfObserver = new MutationObserver(() => {
      
      const zoomInputs = document.querySelectorAll('input[aria-label*="Zoom level"]:not([id]):not([name])');
      zoomInputs.forEach((input, index) => {
        const uid = `pdf-zoom-${Date.now()}-${Math.floor(CryptoRNG.get()*1000000)}-${index}`;
        input.id = uid;
        input.name = uid;
      });
      
      
      const allInputs = document.querySelectorAll('input:not([id]):not([name])');
      allInputs.forEach((input, index) => {
        
        const ariaLabel = input.getAttribute('aria-label');
        const value = input.value || '';
        
        if (ariaLabel && 
            (ariaLabel.includes('Zoom') || 
             ariaLabel.includes('Page') ||
             ariaLabel.includes('zoom') ||
             ariaLabel.includes('page') ||
             input.type === 'text' && 
             (value === '100%' || /^\d+%$/.test(value) || /^\d+$/.test(value)))) {
          input.id = `pdf-input-${Date.now()}-${index}`;
          input.name = `pdf-input-${Date.now()}-${index}`;
          
        }
      });
    });
    
    
    globalPdfObserver.observe(document.body, {
      childList: true,
      subtree: true
    });
    
    
    setTimeout(() => {
      globalPdfObserver.disconnect();
      globalPdfObserver.observe(document.body, {
        childList: true,
        subtree: true
      });
    }, 100);
    
    
    setInterval(() => {
      
      const problematicInputs = document.querySelectorAll('input[type="text"][value="100%"][aria-label="Zoom level"]:not([id]):not([name])');
      problematicInputs.forEach((input, index) => {
        input.id = `zoom-level-input-${Date.now()}-${index}`;
        input.name = `zoom-level-input-${Date.now()}-${index}`;
        
      });
      
      
      const allInputs = document.querySelectorAll('input:not([id]):not([name])');
      allInputs.forEach((input, index) => {
        
        const ariaLabel = input.getAttribute('aria-label');
        const value = input.value || '';
        
        if (ariaLabel && 
            (ariaLabel.includes('Zoom') || 
             ariaLabel.includes('Page') ||
             ariaLabel.includes('zoom') ||
             ariaLabel.includes('page') ||
             input.type === 'text' && 
             (value === '100%' || /^\d+%$/.test(value)))) {
          input.id = `pdf-input-${Date.now()}-${index}`;
          input.name = `pdf-input-${Date.now()}-${index}`;
          
        }
      });
      
      
      const zoomInputs = document.querySelectorAll('input[aria-label*="Zoom level"]:not([id]):not([name])');
      zoomInputs.forEach((input, index) => {
        input.id = `zoom-input-${Date.now()}-${index}`;
        input.name = `zoom-input-${Date.now()}-${index}`;
        
      });
    }, 100);
