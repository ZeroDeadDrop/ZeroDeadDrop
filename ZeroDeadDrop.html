    const CryptoRNG = {

    const Scrub = {
      junk: [], junkSize: 0,
      targetPressure: 180 * 1024 * 1024,
      wipe(obj) {
        if (!obj) return;
        let view;
        if (obj instanceof Uint8Array) {
          view = obj;
        } else if (obj instanceof ArrayBuffer) {
          view = new Uint8Array(obj);
        } else if (ArrayBuffer.isView(obj)) {
          view = new Uint8Array(obj.buffer, obj.byteOffset, obj.byteLength);
        } else {

        view.fill(0xAA); 
        view.fill(0x55); 
        view.fill(0x00); 
        view.fill(0xFF);

      },

      

        keepPressure() {
          try {
            const dm = (typeof navigator !== 'undefined' && navigator.deviceMemory) ? navigator.deviceMemory : 4;
            const scale = Math.min(1, Math.max(0.25, dm / 4));
            const target = Math.floor(this.targetPressure * scale);
            const allocChunk = dm <= 1 ? (1 * 1024 * 1024) : (dm <= 2 ? (4 * 1024 * 1024) : (10 * 1024 * 1024));

    function showAlert(m) {

    async function hkdfDeriveKey(sharedSecret) {
      const hkdfKey = await crypto.subtle.importKey('raw', sharedSecret, 'HKDF', false, ['deriveKey']);
      return await crypto.subtle.deriveKey(
        { name: 'HKDF', hash: 'SHA-384', salt: new Uint8Array(0), info: new Uint8Array(0) },

        const randomTextOverlay = (lines = 1) => {
          ctx.save();
          const isDark = rng() > 0.5;
          ctx.fillStyle = isDark ? `rgba(0,0,0,${0.3+rng()*0.4})` : `rgba(255,255,255,${0.3+rng()*0.4})`;
          ctx.globalCompositeOperation = rng() > 0.5 ? 'source-over' : 'multiply';
          const fontSize = Math.max(12, Math.floor(Math.min(width, height) * (0.02 + rng()*0.08)));
          ctx.font = `${fontSize}px ${rng()>0.6?'Georgia':'sans-serif'}`;
          ctx.textAlign = 'left';
          const margin = 20 + rng()*120;
          for (let i=0;i<lines;i++) {
            ctx.fillText(this.generatePlausibleText(6 + Math.floor(rng()*30)), margin + (rng()*40-20), margin + i*(fontSize + 6) + (rng()*12-6));
          }
          ctx.restore();
        };

        const drawPixelArt = () => {
          const cols = 12 + Math.floor(rng()*48);
          const rows = Math.max(6, Math.floor(cols * height / width));
          const cw = Math.ceil(width / cols), ch = Math.ceil(height / rows);
          for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
            ctx.fillStyle = `hsl(${Math.floor(rng()*360)}, ${30+Math.floor(rng()*50)}%, ${40+Math.floor(rng()*40)}%)`;
            ctx.fillRect(c*cw, r*ch, cw, ch);
          }
        };

        
        const kaleidoscope = (copies = 6) => {
          try {
            const tmp = document.createElement('canvas'); tmp.width = width; tmp.height = height; const tctx = tmp.getContext('2d');
            
            for (let i=0;i<copies;i++){
              tctx.save(); tctx.translate(width/2, height/2); tctx.rotate((i/copies)*Math.PI*2); tctx.fillStyle = `hsla(${rng()*360},60%,${50+rng()*30}%,${0.6})`; tctx.fillRect(0, -height, width/2, height*2); tctx.restore();
            }
            ctx.globalCompositeOperation = 'overlay'; ctx.drawImage(tmp,0,0); ctx.globalCompositeOperation = 'source-over';
          } catch(e){}
        };

        const gradientMesh = () => {
          try {
            const gx = 3 + Math.floor(rng()*6), gy = 3 + Math.floor(rng()*6);
            for (let ix=0;ix<gx;ix++) for (let iy=0;iy<gy;iy++){
              const x = Math.floor(ix/gx*width), y = Math.floor(iy/gy*height), w = Math.ceil(width/gx), h = Math.ceil(height/gy);
              ctx.fillStyle = `hsl(${rng()*360}, ${40+rng()*40}%, ${50+rng()*30}%)`; ctx.fillRect(x,y,w,h);
            }
            
            ctx.globalAlpha = 0.6; paintBaseGradient(); ctx.globalAlpha = 1;
          } catch(e){}
        };

        const lineArt = () => {
          try {
            const isDark = rng() > 0.5;
            ctx.strokeStyle = isDark ? `rgba(0,0,0,${0.08+rng()*0.3})` : `rgba(255,255,255,${0.08+rng()*0.3})`;
            ctx.lineWidth = 1 + rng()*3;
            for (let i=0;i<30;i++){ ctx.beginPath(); ctx.moveTo(rng()*width, rng()*height); ctx.lineTo(rng()*width, rng()*height); ctx.stroke(); }
          } catch(e){}
        };

        const fabricPattern = () => {
          try { for (let y=0;y<height;y+=6){ ctx.fillStyle = `hsla(${rng()*360},20%,${50+rng()*30}%,0.06)`; ctx.fillRect(0,y,width,2);} } catch(e){}
        };

        const bokehOverlay = () => {
          try { for (let i=0;i<24;i++){ ctx.fillStyle = `rgba(255,255,255,${0.02+rng()*0.12})`; ctx.beginPath(); ctx.arc(rng()*width, rng()*height, 8+rng()*64,0,Math.PI*2); ctx.fill(); } } catch(e){}
        };

        const macroTexture = () => {
          try { const img = ctx.createImageData(Math.min(256,width), Math.min(256,height)); for (let i=0;i<img.data.length;i+=4){ const v = (rng()*255)|0; img.data[i]=v; img.data[i+1]=Math.max(0,v-20); img.data[i+2]=Math.min(255,v+20); img.data[i+3]=255;} ctx.putImageData(img,0,0); ctx.globalAlpha=0.2; ctx.drawImage(ctx.canvas,0,0,width,height); ctx.globalAlpha=1; } catch(e){}
        };

        
        const mosaicPattern = (scale = 0.08) => {
          try {
            const tw = Math.max(4, Math.floor(width * scale));
            const th = Math.max(4, Math.floor(height * scale));
            const tmp = document.createElement('canvas'); tmp.width = tw; tmp.height = th;
            const tctx = tmp.getContext('2d', { willReadFrequently: true });
            
            tctx.fillStyle = `hsl(${rng()*360},60%,${50+rng()*30}%)`; tctx.fillRect(0,0,tw,th);
            for (let i=0;i<3;i++) { tctx.fillStyle = `hsla(${rng()*360},60%,${45+rng()*30}%,${0.2+rng()*0.6})`; tctx.fillRect(rng()*tw, rng()*th, rng()*tw, rng()*th); }
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(tmp, 0, 0, width, height);
          } catch(e){}
        };

        const drawPixelStripes = () => {
          const bands = 6 + Math.floor(rng()*24);
          const stripeW = Math.max(2, Math.floor(width / bands));
          for (let i=0;i<bands;i++){
            ctx.fillStyle = `hsl(${(i * (360 / bands) + rng()*40) % 360}, ${40 + rng()*40}%, ${45 + rng()*40}%)`;
            ctx.fillRect(i*stripeW, 0, stripeW + 1, height);
          }
        };

        const applyHalftone = (dotStep = 8) => {
          try {
            const img = ctx.getImageData(0,0,width,height);
            const out = ctx.createImageData(width,height);
            for (let y=0;y<height;y+=dotStep) for (let x=0;x<width;x+=dotStep){
              const i = (y*width + x) * 4; const r = img.data[i], g = img.data[i+1], b = img.data[i+2];
              const lum = 0.299*r + 0.587*g + 0.114*b; const radius = Math.max(1, Math.floor((1 - lum/255) * (dotStep/2)));
              for (let yy=-radius; yy<=radius; yy++) for (let xx=-radius; xx<=radius; xx++){ const xi = x+xx, yi = y+yy; if (xi<0||yi<0||xi>=width||yi>=height) continue; const ii=(yi*width+xi)*4; out.data[ii]=out.data[ii+1]=out.data[ii+2]=0; out.data[ii+3]=255; }
            }
            ctx.putImageData(out,0,0);
          } catch(e){}
        };

        const posterize = (levels = 5) => {
          try {
            const img = ctx.getImageData(0,0,width,height);
            
            for (let i=0;i<img.data.length;i+=4){
              img.data[i] = Math.min(255, img.data[i] + 30);
              img.data[i+1] = Math.min(255, img.data[i+1] + 30);
              img.data[i+2] = Math.min(255, img.data[i+2] + 30);
              img.data[i] = Math.floor(img.data[i]/(256/levels))*(256/levels);
              img.data[i+1] = Math.floor(img.data[i+1]/(256/levels))*(256/levels);
              img.data[i+2] = Math.floor(img.data[i+2]/(256/levels))*(256/levels);
            }
            ctx.putImageData(img,0,0);
          } catch(e){}
        };

        const tiledCollage = (tileCount = 6) => {
          try {
            for (let i=0;i<tileCount;i++){
              const tw = Math.max(32, Math.floor(width * (0.1 + CryptoRNG.get()*0.4))); const th = Math.max(32, Math.floor(height * (0.1 + CryptoRNG.get()*0.4)));
              const tx = Math.floor(CryptoRNG.get() * (width - tw)); const ty = Math.floor(CryptoRNG.get() * (height - th));
              const c = this.generateRandomImage(tw, th);
              ctx.globalAlpha = 0.7 + CryptoRNG.get()*0.3; ctx.drawImage(c, tx, ty, tw, th); ctx.globalAlpha = 1;
            }
          } catch(e){}
        };

        const highFreqDither = () => {
          try {
            const img = ctx.getImageData(0,0,width,height); for (let i=0;i<img.data.length;i+=4){ const n = (CryptoRNG.get()-0.5)*24; img.data[i]=Math.max(0,Math.min(255,img.data[i]+n)); img.data[i+1]=Math.max(0,Math.min(255,img.data[i+1]+n)); img.data[i+2]=Math.max(0,Math.min(255,img.data[i+2]+n)); } ctx.putImageData(img,0,0);
          } catch(e){}
        };
        
        
        if (rng() > 0.5) {
          paintBaseGradient();
          if (rng() > 0.5) randomShapesLayer(6 + Math.floor(rng()*18));
          if (this.s.maxRandomness || rng() > 0.6) splatter();
          if (rng() > 0.6) randomTextOverlay(1 + Math.floor(rng()*4));
          
          if (rng() > 0.82 && rng() > (this.s.maxRandomness ? 0.1 : 0.5)) drawPixelArt();
        } else {
          
          const subtleGrad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width,height)*0.8);
          subtleGrad.addColorStop(0, `hsl(${rng()*360}, ${30 + rng()*40}%, ${60 + rng()*20}%)`);
          subtleGrad.addColorStop(1, `hsl(${rng()*360}, ${25 + rng()*30}%, ${45 + rng()*25}%)`);
          ctx.fillStyle = subtleGrad; ctx.fillRect(0,0,width,height);
          if (rng() > 0.7) randomShapesLayer(2 + Math.floor(rng()*5));
        }

        
        if (rng() > 0.4 || this.s.maxRandomness) {
          const r = rng();
          if (r > 0.92) mosaicPattern(0.06 + rng()*0.18);
          else if (r > 0.78) drawPixelStripes();
          else if (r > 0.62) tiledCollage(2 + Math.floor(rng()*5));
          else if (r > 0.5) posterize(3 + Math.floor(rng()*4));
          else if (r > 0.36) gradientMesh();
          else if (r > 0.22) kaleidoscope(4 + Math.floor(rng()*6));
          else if (r > 0.12) lineArt();
          else fabricPattern();
        }
        if (this.s.maxRandomness && rng() > 0.4) highFreqDither();
        if (rng() > 0.72) applyHalftone(6 + Math.floor(rng()*12));
        if (rng() > 0.6) bokehOverlay();
        if (rng() > 0.7) macroTexture();

        
        try {
          const imageData = ctx.getImageData(0, 0, width, height);
          const data = imageData.data;
          for (let i = 0; i < data.length; i += 4) {
            const n = (rng() - 0.5) * (6 + rng()*18);
            data[i] = Math.max(0, Math.min(255, data[i] + n));
            data[i+1] = Math.max(0, Math.min(255, data[i+1] + n));
            data[i+2] = Math.max(0, Math.min(255, data[i+2] + n));
          }
          ctx.putImageData(imageData, 0, 0);
        } catch (e) {}

        
        if (this.s.maxRandomness) {
          try {
            ctx.save();
            ctx.globalAlpha = 0.12 + rng()*0.5;
            for (let i=0;i<4;i++) {
              ctx.fillStyle = `hsla(${Math.floor(rng()*360)},70%,${50+rng()*30}%,${0.04 + rng()*0.2})`;
              ctx.fillRect(rng()*width, rng()*height, rng()*width*0.4, rng()*height*0.06);
            }
            ctx.restore();
            if (rng()>0.5) ctx.fillText(' ' + this.rid(4), 10 + rng()*120, height - 30 - rng()*20);
          } catch(e){}
        }

        
        const textCount = Math.floor(rng() * 5) + 1;
        for (let t = 0; t < textCount; t++) {
          ctx.fillStyle = rng() > 0.5 ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.8)';
          ctx.font = `${Math.floor(rng() * 30) + 20}px Arial`;
          ctx.fillText(this.generatePlausibleText(Math.floor(rng() * 10) + 5), rng() * width, rng() * height);
        }

        return canvas;
      },

      async canvasToBlob(canvas, format = 'image/jpeg', quality = 0.88) {
        return new Promise(resolve => canvas.toBlob(resolve, format, quality));
      },

      cleanBlobs() {
        try {
          
          try { (this.s.revocationTimers || []).forEach(t => { try { clearTimeout(t); } catch(e) {} }); } catch(e) {}
          this.s.revocationTimers = [];
          
          
          const persistentUrls = this.s.persistentBlobUrls || [];
          (this.s.blobUrls || []).forEach(u => {
            
            if (!persistentUrls.includes(u)) {
              try { URL.revokeObjectURL(u); } catch(e) {}
            }
          });
        } catch (e) {}
        this.s.blobUrls = [];
      },

        const words = ['the','quick','brown','fox','jumps','over','lazy','dog','hello','world','report','summary','update','meeting','notes','action','item','deadline','client','project','status','review','complete','pending','deliverable','issue','fixed','deploy','build','release','version','note','entry','sample','data','record','user','account','password','token','session','backup','archive','config','settings','profile','invoice','receipt','transaction','order','shipment','address','contact','phone','email','draft','final','approved','rejected','urgent','priority','milestone','sprint','agenda','minutes','proposal','contract','license','credentials','attachment','reference','analysis','chart','table','figure','metric','budget','estimate','cost','revenue','schedule','timeline','risk','incident','alert','monitoring','health','reporter','assignee','owner','team','department','garden','moon','ocean','river','library','station','market','city','forest','village','corner','window','keyboard','screen','coffee','paper','letter','story','character','memory','dream','system','process','function','method','approach','solution','problem','question','answer','result','outcome','impact','change','improvement','development','research','study','finding','conclusion','recommendation','objective','goal','target','achievement','performance','quality','efficiency','productivity','strategy','plan','execution','implementation','management','leadership','collaboration','communication','coordination','integration','optimization','innovation','transformation','evaluation','assessment','measurement','indicator','benchmark','standard','requirement','specification','documentation','instruction','procedure','guideline','policy','framework','model','template','example','sample','prototype','demonstration','presentation','workshop','training','session','seminar','conference','discussion','debate','consultation','feedback','review','approval','validation','verification','testing','inspection','audit','compliance','governance','accountability','responsibility','authority','decision','judgment','discretion','consideration','attention','focus','emphasis','priority','importance','significance','relevance','value','benefit','advantage','opportunity','potential','capability','capacity','resource','asset','investment','expenditure','allocation','distribution','provision','supply','demand','need','requirement','expectation','satisfaction','experience','impression','perception','understanding','knowledge','information','intelligence','insight','awareness','recognition','appreciation','acknowledgment','confirmation','assurance','guarantee','commitment','obligation','agreement','arrangement','coordination','cooperation','partnership','relationship','connection','association','affiliation','membership','participation','involvement','engagement','contribution','support','assistance','service','delivery','provision','presentation','representation','demonstration','illustration','explanation','description','clarification','interpretation','translation','adaptation','modification','adjustment','revision','correction','update','upgrade','enhancement','refinement','polishing','completion','finalization','conclusion','termination','closure','resolution','settlement','arrangement','organization','structure','composition','configuration','layout','design','architecture','infrastructure','foundation','framework','platform','environment','context','situation','circumstance','condition','state','status','position','location','place','area','region','territory','domain','field','sector','industry','market','segment','category','class','type','kind','sort','variety','range','spectrum','scope','extent','scale','magnitude','dimension','aspect','element','component','part','piece','unit','module','section','segment','portion','fraction','percentage','proportion','ratio','rate','frequency','occurrence','instance','case','example','illustration','sample','specimen','model','pattern','trend','tendency','direction','movement','shift','change','transition','transformation','evolution','development','progress','advancement','improvement','growth','expansion','extension','increase','rise','surge','boost','gain','benefit','profit','return','yield','output','product','result','outcome','consequence','effect','impact','influence','significance','importance','relevance','applicability','utility','usefulness','effectiveness','efficiency','productivity','performance','quality','excellence','superiority','advantage','strength','capability','competence','proficiency','expertise','mastery','skill','talent','ability','aptitude','potential','promise','prospect','opportunity','possibility','chance','likelihood','probability','certainty','assurance','confidence','trust','reliability','dependability','consistency','stability','security','safety','protection','preservation','conservation','maintenance','sustainability','durability','longevity','permanence','continuity','persistence','endurance','resilience','adaptability','flexibility','versatility','mobility','agility','responsiveness','sensitivity','awareness','consciousness','mindfulness','attention','concentration','focus','dedication','commitment','determination','perseverance','persistence','tenacity','resolution','resolve','willpower','discipline','control','management','governance','administration','supervision','oversight','direction','guidance','leadership','influence','authority','power','control','command','dominance','supremacy','superiority','advantage','edge','benefit','value','worth','merit','quality','excellence'];

        const names = ['Alex','Jordan','Casey','Taylor','Morgan','Riley','Jamie','Avery','Sam','Chris','Pat','Drew','Rowan','Quinn','Elliot','Parker','Skyler','Reese','Cameron','Dakota','Phoenix','River','Sage','Blake','Finley','Hayden','Logan','Mason','Emerson','Kendall','Madison','Harper','Ashton','Bailey','Charlie','Dylan','Jesse','Kyle','Lane','Max','Noah','Paige','Quinn','Reed','Shane','Spencer','Tanner','Tyler','Val','Wesley','Zane'];
        const connectors = ['and', 'but', 'so', 'therefore', 'however', 'meanwhile', 'afterwards', 'besides', 'moreover', 'furthermore', 'additionally', 'consequently', 'nonetheless', 'nevertheless', 'hence', 'thus', 'accordingly', 'similarly', 'likewise', 'conversely', 'alternatively', 'otherwise', 'instead', 'rather', 'yet', 'still', 'though', 'although', 'whereas', 'while'];

        const rand = (arr) => arr[Math.floor(CryptoRNG.get()*arr.length)];
        const rint = (a,b) => a + Math.floor(CryptoRNG.get()*(b-a+1));

        const makeSentence = (targetLen) => {
          const parts = [];
          const segCount = 1 + Math.floor(CryptoRNG.get()*3);
          for (let s=0;s<segCount;s++) {
            const segLen = 3 + Math.floor(CryptoRNG.get()*8);
            let seg = '';
            if (CryptoRNG.get() > 0.6) seg += rand(['The','A','This','That']);

          }

      generateSimplePdfBytes(text = 'Placeholder') {
        try {
          const w = 612, h = 792; 
          const esc = (s) => String(s).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
          const lines = (String(text) || '').split('\n').slice(0,40).map(l => esc(l));
          const encoder = new TextEncoder();
          const parts = [];
          parts.push('%PDF-1.1\n');
          parts.push('1 0 obj<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');
          parts.push('2 0 obj<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n');
          parts.push('3 0 obj<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ' + w + ' ' + h + '] /Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >>\nendobj\n');
          parts.push('4 0 obj<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>\nendobj\n');

          let content = 'BT /F1 12 Tf 50 ' + (h - 72) + ' Td (';

          const NL = String.fromCharCode(10);
          const lineSep = ') Tj' + NL + 'T* (';
          content += lines.join(lineSep) + ') Tj ET' + NL;
          const contentBytes = encoder.encode(content);
          parts.push('5 0 obj<< /Length ' + contentBytes.length + ' >>\nstream\n');
          parts.push(content);
          parts.push('\nendstream\nendobj\n');

          let offset = 0;
          const chunks = parts.map(p => typeof p === 'string' ? encoder.encode(p) : p);
          for (const c of chunks) offset += c.length;

          const full = [];
          let cursor = 0;
          const objOffsets = [];
          const concat = (arr) => { for (const a of arr) full.push(a); };

          const header = encoder.encode('%PDF-1.1\n'); full.push(header); cursor += header.length;
          const o1 = encoder.encode('1 0 obj<< /Type /Catalog /Pages 2 0 R >>\nendobj\n'); objOffsets.push(cursor); full.push(o1); cursor += o1.length;
          const o2 = encoder.encode('2 0 obj<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n'); objOffsets.push(cursor); full.push(o2); cursor += o2.length;
          const o3 = encoder.encode('3 0 obj<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ' + w + ' ' + h + '] /Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >>\nendobj\n'); objOffsets.push(cursor); full.push(o3); cursor += o3.length;
          const o4 = encoder.encode('4 0 obj<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>\nendobj\n'); objOffsets.push(cursor); full.push(o4); cursor += o4.length;
          const o5pre = encoder.encode('5 0 obj<< /Length ' + contentBytes.length + ' >>\nstream\n'); objOffsets.push(cursor); full.push(o5pre); cursor += o5pre.length;
          full.push(contentBytes); cursor += contentBytes.length;
          const o5post = encoder.encode('\nendstream\nendobj\n'); full.push(o5post); cursor += o5post.length;

          const xrefStart = cursor;
          const xrefLines = [];
          xrefLines.push('xref\n0 6\n0000000000 65535 f \n');
          for (const off of objOffsets) {
            xrefLines.push(String(off).padStart(10,'0') + ' 00000 n \n');
          }
          const xref = encoder.encode(xrefLines.join(''));
          full.push(xref); cursor += xref.length;
          const trailer = encoder.encode('trailer<< /Size 6 /Root 1 0 R >>\nstartxref\n' + xrefStart + '\n%%EOF\n');
          full.push(trailer);

          let totalLen = 0; for (const f of full) totalLen += f.length;
          const out = new Uint8Array(totalLen);
          let ptr = 0; for (const f of full) { out.set(f, ptr); ptr += f.length; }
          return out;
        } catch (e) {
          return null;
        }
      },

      async generateFakeZip(targetSize) {
        try {
          
          const files = [];
          const n = 1 + Math.floor(CryptoRNG.get() * 3); 
          let remaining = Math.max(0, targetSize - 512);
          for (let i = 0; i < n; i++) {
            const want = Math.max(16, Math.min(remaining, Math.floor(remaining / (n - i))));
            const types = ['text','json','image','video'];
            const typ = types[Math.floor(CryptoRNG.get() * types.length)];
            let name = `file_${this.rid(4)}_${i}.bin`;
            let blob = null;
            try {
              if (typ === 'text') {
                name = `file_${this.rid(4)}_${i}.txt`;
                let txt = this.generatePlausibleText(Math.min(1024, want));
                let enc = new TextEncoder().encode(txt);
                if (enc.length < want) {
                  const buf = new Uint8Array(want);
                  buf.set(enc, 0);
                  for (let j = enc.length; j < want; j++) buf[j] = 0x20 + ((i * 17 + j) & 0x5F);
                  blob = new Blob([buf], { type: 'text/plain' });
                } else {
                  blob = new Blob([enc.slice(0, want)], { type: 'text/plain' });
                }
              } else if (typ === 'json') {
                name = `file_${this.rid(4)}_${i}.json`;
                try {
                  blob = await this.generateFakeJson(want);
                  if (blob.size > want) blob = blob.slice(0, want, 'application/json');
                  else if (blob.size < want) {
                    const pad = this.generateLargeRandom(want - blob.size);
                    blob = new Blob([blob, pad], { type: 'application/json' });
                  }
                } catch (e) {
                  const txt = this.generatePlausibleText(Math.min(1024, want));
                  const enc = new TextEncoder().encode(txt).slice(0, want);
                  blob = new Blob([enc], { type: 'application/json' });
                }
              } else { 
                name = `file_${this.rid(4)}_${i}.mp4`;
                try {
                  let playable = null;
                  try { playable = await this.generateRandomVideoBlob(Math.min(want, 2*1024*1024)); } catch(e) { playable = null; }
                  if (!playable) {
                    try { playable = await this.generateSimpleAnimatedGif(Math.min(want, 512*1024), 480, 270, 12); name = `file_${this.rid(4)}_${i}.gif`; } catch(e) { playable = null; }
                  }
                  if (playable) {
                    try { playable = await this.padBlobToSize(playable, want); } catch(e) { }
                    if (playable.size > want) playable = playable.slice(0, want, playable.type || 'application/octet-stream');
                    blob = playable;
                    
                    if (playable.type && playable.type.indexOf('webm') >= 0) name = name.replace(/\.mp4$/, '.webm');
                    else if (playable.type && playable.type.indexOf('gif') >= 0) name = name.replace(/\.mp4$/, '.gif');
                  } else {
                    const pad = this.generateLargeRandom(want);
                    blob = await this.padBlobToSize(new Blob([pad], { type: 'application/octet-stream' }), want);
                  }
                } catch (e) {
                  const pad = this.generateLargeRandom(want);
                  blob = new Blob([pad], { type: 'application/octet-stream' });
                }
              }
            } catch (e) {
              const pad = this.generateLargeRandom(want);
              blob = new Blob([pad], { type: 'application/octet-stream' });
            }
            files.push({ name, blob });
            remaining -= want;
          }
          let zip = await this.createZipFromFiles(files);
          
          try {
            const ab = await zip.arrayBuffer();
            const diag = this.validateZipBuffer(ab);
            try { this.appendPDLog('generateFakeZip: ZIP validation lines:\n' + (diag || '<empty>')); } catch(e) {}
            if (!diag || diag.trim().length === 0) throw new Error('ZIP validation empty');
          } catch (vErr) {
            try { this.appendPDLog('generateFakeZip: initial ZIP failed validation, attempting simple single-file fallback'); } catch(e) {}
            try {
              
              const content = this.generateLargeRandom(Math.max(256, targetSize - 512));
              const single = [{ name: 'readme.txt', blob: new Blob([content], { type: 'text/plain' }) }];
              zip = await this.createZipFromFiles(single);
              try { const ab2 = await zip.arrayBuffer(); const diag2 = this.validateZipBuffer(ab2); this.appendPDLog('generateFakeZip: fallback ZIP validation:\n' + (diag2||'<empty>')); } catch(e) {}
            } catch (e2) {}
          }
          
          
          
          
          
          if (zip.size < targetSize) {
            try {
              zip = await this._padZip(zip, targetSize);
            } catch (e) {
              dbg('ZIP padding failed, using original size', e);
            }
          }
          return zip;
        } catch (e) {
          return new Blob([this.generateLargeRandom(targetSize)], { type: 'application/octet-stream' });
        }
      },

      
      async validateGeneratedBlob(blob) {
        try {
          if (!blob || !blob.size) return false;
          const t = (blob.type || '').toLowerCase();
          const ab = await blob.arrayBuffer();
          const ua = new Uint8Array(ab);

          
          const looksLikeMP4 = this.looksLikeMP4(ua);

          if (t === 'image/gif' || (ua.length >= 6 && (String.fromCharCode.apply(null, ua.subarray(0,6)) === 'GIF87a' || String.fromCharCode.apply(null, ua.subarray(0,6)) === 'GIF89a'))) {
            if (ua[ua.length-1] !== 0x3B) return false;
            return true;
          }

          if (t === 'video/webm' || (ua.length >= 4 && ua[0]===0x1A && ua[1]===0x45 && ua[2]===0xDF && ua[3]===0xA3)) {
            return ua.length > 512;
          }

          if (looksLikeMP4 || t.indexOf('mp4') >= 0 || t.indexOf('video/mp4') >= 0) {
            return ua.length > 2048 && looksLikeMP4;
          }

          if (t.startsWith('image/jpeg') || (ua.length >= 3 && ua[0]===0xFF && ua[1]===0xD8 && ua[2]===0xFF)) return true;
          if (t === 'image/png' || (ua.length >= 8 && ua[0]===0x89 && ua[1]===0x50 && ua[2]===0x4E && ua[3]===0x47)) return true;
          if (t === 'application/pdf' || (ua.length >= 4 && ua[0]===0x25 && ua[1]===0x50 && ua[2]===0x44 && ua[3]===0x46)) return true;
          if (t === 'application/zip' || (ua.length >= 4 && ua[0]===0x50 && ua[1]===0x4B && ua[2]===0x03 && ua[3]===0x04)) return true;

          return true;
        } catch (e) { return false; }
      },

      
      async padBlobToSize(blob, targetSize) {
        try {
          
          if (this.s && this.s.decoyAbortRequested) throw new Error('Decoy generation aborted');
          
          if (!blob || !targetSize) return blob;
          
          if (blob.size > targetSize) {
            const trimmed = blob.slice(0, targetSize);
            return new Blob([trimmed], { type: blob.type || 'application/octet-stream' });
          }
          
          if (blob.size === targetSize) return blob;
          const t = (blob.type || '').toLowerCase();
          if (t.includes('png')) {
            const out = await this._padPng(blob, targetSize);
            if (out && out.size >= targetSize) return out;
            const need = targetSize - (out ? out.size : blob.size);
            const pad = this.generateLargeRandom(need);
            return new Blob([out || blob, pad], { type: (out && out.type) || blob.type || 'application/octet-stream' });
          }
          if (t.includes('mp4') || t.includes('video/mp4') || t.includes('mov') || t.includes('m4v')) {

      async runEndToEndTests(opts) {

          const pass = (opts.passphrase) ? opts.passphrase : this.rid(12);
          const salt = crypto.getRandomValues(new Uint8Array(16));
          const iter = opts.iterations || Math.max(10000, Math.floor((this.s && this.s.iterations) ? Math.floor(this.s.iterations/10) : 20000));
          const hash = (this.s && this.s.hashAlgorithm) ? this.s.hashAlgorithm : 'SHA-256';

          const start = performance.now();
          const key = await this.deriveKey(pass, salt, iter, hash);
          const iv = crypto.getRandomValues(new Uint8Array(12));
          const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, payload);
          const encTime = Math.round(performance.now() - start);

          const start2 = performance.now();
          const key2 = await this.deriveKey(pass, salt, iter, hash);
          const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key2, cipher);
          const decTime = Math.round(performance.now() - start2);
          const ok = (new Uint8Array(plainBuf).length === payload.length) && (dec.decode(plainBuf) === dec.decode(payload));

          this.appendPDLog(`E2E: encrypt ${this.fmtB(cipher.byteLength || (cipher && cipher.byteLength) || 0)} encTime=${encTime}ms decTime=${decTime}ms ok=${ok}`);

          
          let wrongOk = false;

      looksLikeWebM(buf) {

      looksLikeMP4(buf) {
        try {
          const ua = (buf && buf instanceof Uint8Array) ? buf : new Uint8Array(buf || []);
          const limit = Math.min(256, Math.max(16, ua.length - 4));
          for (let i = 0; i < limit; i++) {
            if (ua[i] === 0x66 && ua[i+1] === 0x74 && ua[i+2] === 0x79 && ua[i+3] === 0x70) return true;
          }
          return false;
        } catch (e) { return false; }
      },

      getDosDateTime(date) {
        try {
          const d = date || new Date();
          const year = d.getFullYear();
          const month = d.getMonth() + 1;
          const day = d.getDate();
          const hours = d.getHours();
          const minutes = d.getMinutes();
          const seconds = Math.floor(d.getSeconds() / 2); 
          const dosTime = (hours << 11) | (minutes << 5) | (seconds & 0x1F);
          const dosDate = ((year - 1980) << 9) | (month << 5) | day;
          const unix = Math.floor(d.getTime() / 1000);
          return { dosTime, dosDate, unix };
        } catch (e) { return { dosTime: 0, dosDate: 0, unix: 0 }; }

      async createZipFromFiles(files) {
        const makeCRCTable = () => {
          const table = new Uint32Array(256);
          for (let i = 0; i < 256; i++) {
            let c = i;
            for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
            table[i] = c >>> 0;
          }
          return table;
        };
        const crcTable = makeCRCTable();
        const crc32 = (buf) => {
          let crc = 0xFFFFFFFF;
          for (let i = 0; i < buf.length; i++) crc = (crc >>> 8) ^ crcTable[(crc ^ buf[i]) & 0xFF];
          return (crc ^ 0xFFFFFFFF) >>> 0;
        };

        const enc = new TextEncoder();
        const localParts = [];
        const centralParts = [];
        let offset = 0;
        
        const fileOffsets = [];
        const fileExtras = [];
        const fileDts = [];
        // Cache per-file data so the central-directory loop does not need to
        // re-read each blob (avoids doubling memory usage and I/O for large files).
        const fileFnameBufs = [];
        const fileCrcs = [];
        const fileCompSizes = [];
        for (const f of files) {
          const fname = f.name.replace(/\\/g, '/');
          const fnameBuf = enc.encode(fname);
          const dataBuf = new Uint8Array(await f.blob.arrayBuffer());
          const crc = crc32(dataBuf);
          const compSize = dataBuf.length;
          const uncompSize = dataBuf.length;
          fileFnameBufs.push(fnameBuf);
          fileCrcs.push(crc);
          fileCompSizes.push(compSize);

          
          const dt = this.getDosDateTime(new Date(2020, 0, 1, 0, 0, 0)); 
          
          const markerEnc = new TextEncoder();
          let markerBytes = new Uint8Array(0);
          try { if (this.s && this.s.runGuid) markerBytes = markerEnc.encode(String(this.s.runGuid)).slice(0, 64); } catch(e) { markerBytes = new Uint8Array(0); }
          const extraData = new Uint8Array(1 + 4 + markerBytes.length); 
          extraData[0] = 0x01;
          const edv = new DataView(extraData.buffer);
          edv.setUint32(1, dt.unix, true);
          if (markerBytes.length) extraData.set(markerBytes, 1 + 4);
          const extraDataLen = extraData.length; 
          const extraFieldTotal = 4 + extraDataLen; 

          const localHeader = new Uint8Array(30 + fnameBuf.length + extraFieldTotal);
          const dv = new DataView(localHeader.buffer);
          let p = 0;
          dv.setUint32(p, 0x04034b50, true); p += 4; 
          dv.setUint16(p, 20, true); p += 2; 
          dv.setUint16(p, 0, true); p += 2; 
          dv.setUint16(p, 0, true); p += 2; 
          dv.setUint16(p, dt.dosTime, true); p += 2; 
          dv.setUint16(p, dt.dosDate, true); p += 2; 
          dv.setUint32(p, crc, true); p += 4; 
          dv.setUint32(p, compSize, true); p += 4; 
          dv.setUint32(p, uncompSize, true); p += 4; 
          dv.setUint16(p, fnameBuf.length, true); p += 2; 
          dv.setUint16(p, extraFieldTotal, true); p += 2;

          localHeader[extraStart + 0] = 0x55; localHeader[extraStart + 1] = 0x54; 
          localHeader[extraStart + 2] = extraDataLen & 0xFF; localHeader[extraStart + 3] = (extraDataLen >> 8) & 0xFF;
          localHeader.set(extraData, extraStart + 4);
          
          fileOffsets.push(offset);
          fileExtras.push({ extraData: extraData, extraLen: extraData.length });
          fileDts.push(dt);
          localParts.push(localHeader);
          localParts.push(dataBuf);
          offset += localHeader.length + dataBuf.length;

          const dt = fileDts[idx] || this.getDosDateTime(new Date(2020, 0, 1, 0, 0, 0));
          const centExtraLen = 4 + (fe.extraLen || 0);
          const centHeader = new Uint8Array(46 + fnameBuf.length + centExtraLen);
          const cdv = new DataView(centHeader.buffer);
          let p2 = 0;
          cdv.setUint32(p2, 0x02014b50, true); p2 += 4; 
          cdv.setUint16(p2, 0x033F, true); p2 += 2; 
          cdv.setUint16(p2, 20, true); p2 += 2; 
          cdv.setUint16(p2, 0, true); p2 += 2; 
          cdv.setUint16(p2, 0, true); p2 += 2; 
          cdv.setUint16(p2, dt.dosTime, true); p2 += 2; 
          cdv.setUint16(p2, dt.dosDate, true); p2 += 2; 
          cdv.setUint32(p2, crc, true); p2 += 4; 
          cdv.setUint32(p2, compSize, true); p2 += 4; 
          cdv.setUint32(p2, uncompSize, true); p2 += 4; 
          cdv.setUint16(p2, fnameBuf.length, true); p2 += 2; 
          cdv.setUint16(p2, centExtraLen, true); p2 += 2; 
          cdv.setUint16(p2, 0, true); p2 += 2; 
          cdv.setUint16(p2, 0, true); p2 += 2; 
          cdv.setUint16(p2, 0, true); p2 += 2; 
          cdv.setUint32(p2, 0x20 << 16, true); p2 += 4; 
          cdv.setUint32(p2, fileOffsets[idx], true); p2 += 4; 
          centHeader.set(fnameBuf, 46);
          
          const centExtraStart = 46 + fnameBuf.length;
          centHeader[centExtraStart + 0] = 0x55; centHeader[centExtraStart + 1] = 0x54;
          const ed = fe.extraData || new Uint8Array(0);
          centHeader[centExtraStart + 2] = ed.length & 0xFF; centHeader[centExtraStart + 3] = (ed.length >> 8) & 0xFF;
          centHeader.set(ed, centExtraStart + 4);
          centralParts.push(centHeader);
        }

        const endHeader = new Uint8Array(22);
        const edv = new DataView(endHeader.buffer);
        let q = 0;
        edv.setUint32(q, 0x06054b50, true); q += 4; 
        edv.setUint16(q, 0, true); q += 2; 
        edv.setUint16(q, 0, true); q += 2; 
        edv.setUint16(q, centralParts.length, true); q += 2; 
        edv.setUint16(q, centralParts.length, true); q += 2; 
        edv.setUint32(q, centralSize, true); q += 4; 
        edv.setUint32(q, offset, true); q += 4; 
        edv.setUint16(q, 0, true); q += 2; 

        const parts = [];
        for (const p of localParts) parts.push(p);
        for (const p of centralParts) parts.push(p);
        parts.push(endHeader);
        
        try {
          const totalLen = offset + centralSize + endHeader.length;
          const out = new Uint8Array(totalLen);
          let cur = 0;
          for (const p of localParts) { out.set(p, cur); cur += p.length; }
          for (const p of centralParts) { out.set(p, cur); cur += p.length; }
          out.set(endHeader, cur); cur += endHeader.length;

          const diag = [];
          
          let scanPtr = 0;
          for (let i = 0; i < files.length; i++) {
            if (scanPtr + 30 > out.length) { diag.push(`file[${i}] header truncated at ${scanPtr}`); break; }
            const sig = (out[scanPtr] | (out[scanPtr+1]<<8) | (out[scanPtr+2]<<16) | (out[scanPtr+3]<<24)) >>> 0;
            if (sig !== 0x04034b50) { diag.push(`file[${i}] local header sig mismatch at ${scanPtr}: 0x${sig.toString(16)}`); break; }
            const fnameLen = out[scanPtr+26] | (out[scanPtr+27]<<8);
            const extraLen = out[scanPtr+28] | (out[scanPtr+29]<<8);
            const dataStart = scanPtr + 30 + fnameLen + extraLen;
            
            const compSize = (out[scanPtr+18] | (out[scanPtr+19]<<8) | (out[scanPtr+20]<<16) | (out[scanPtr+21]<<24)) >>> 0;
            if (dataStart + compSize > out.length) {

            diag.push(`file[${i}]: hdr@${scanPtr} fnameLen=${fnameLen} compSize=${compSize} dataStart=${dataStart}`);
            scanPtr = dataStart + compSize;
          }
          try { this.appendPDLog('createZipFromFiles: validation:\n' + diag.join('\n')); } catch(e) { try { this.logError('createZipFromFiles: appendPDLog(validation) failed', e); } catch(ee) {} }
        } catch (e) {

        }

                const dr=r-palette[j][0], dg=g-palette[j][1], db=b-palette[j][2];

          let dict = new Map();

          const resetDict = () => {
            dict = new Map();
            for (let i = 0; i < CLEAR; i++) dict.set(String.fromCharCode(i), i);
          };
          resetDict();
          let nextCode = EOI + 1;

          const outBits = [];
          let cur = 0, curBits = 0;
          function emit(code) {
            cur |= (code << curBits);
            curBits += codeSize;
            while (curBits >= 8) {
              outBits.push(cur & 0xFF);
              cur >>= 8;
              curBits -= 8;
            }
          }

          emit(CLEAR);
          let w = '';
          for (let i=0;i<indices.length;i++) {
            const k = String.fromCharCode(indices[i]);
            const wk = w + k;
            if (dict.has(wk)) {
              w = wk;
            } else {
              emit(w ? dict.get(w) : indices[i]);
              if (nextCode < 4096) {
                dict.set(wk, nextCode++);
                if (nextCode === (1 << codeSize) && codeSize < 12) codeSize++;
              } else {
                
                emit(CLEAR);
                resetDict();
                nextCode = EOI + 1;
                codeSize = minCodeSize + 1;
              }
              w = k;
            }
          }
          if (w) emit(dict.get(w) !== undefined ? dict.get(w) : w.charCodeAt(0));
          emit(EOI);
          if (curBits > 0) outBits.push(cur & 0xFF);

          const blocks = [];
          for (let i=0;i<outBits.length;i+=255) {
            const l = Math.min(255, outBits.length - i);
            blocks.push([l].concat(outBits.slice(i, i+l)));
          }
          const flat = [];
          for (const b of blocks) writeBytes(b, flat);
          flat.push(0); 
          return flat;
        }

        const out = [];

        writeBytes([0x47,0x49,0x46,0x38,0x39,0x61], out);

        writeBytes([width & 0xFF, (width>>8)&0xFF, height & 0xFF, (height>>8)&0xFF], out);

        writeBytes([0xF7, 0x00, 0x00], out);

        for (const c of palette) writeBytes(c, out);


        writeBytes([0x21,0xFF,0x0B], out);
        writeBytes([0x4E,0x45,0x54,0x53,0x43,0x41,0x50,0x45,0x32,0x2E,0x30], out);

          writeBytes([0x21,0xF9,0x04,0x08, frameDelay & 0xFF, (frameDelay>>8)&0xFF, 0x00, 0x00], out);

          writeBytes([0x2C,0x00,0x00,0x00,0x00, width & 0xFF, (width>>8)&0xFF, height & 0xFF, (height>>8)&0xFF, 0x00], out);

          const minCodeSize = 8;

              }
            }
            return base;
          })(fd);
          const comp = lzwEncode(minCodeSize, indices);
          writeBytes(comp, out);
        }

        const u8 = new Uint8Array(out);
        return new Blob([u8], { type: 'image/gif' });

      updateCharCount() {
        const el = document.getElementById('charCount');
        if (el) {
          try {
            const bytes = new TextEncoder().encode(this.s.textInput || '').length;
            el.textContent = `Bytes: ${bytes.toLocaleString()} / ${C.MAX_TEXT_LENGTH.toLocaleString()}`;
          } catch (e) { el.textContent = `Chars: ${String(this.s.textInput || '').length.toLocaleString()} / ${C.MAX_TEXT_LENGTH.toLocaleString()}`; }
        }
      },

      updateTotalSize() {
        const el = document.getElementById('totalSize');
        if (el) {
          const textSize = new TextEncoder().encode(this.s.textInput).length;
          const fileSize = this.s.files.reduce((a, f) => a + f.size, 0);
          const total = fileSize + textSize;
          el.textContent = `Total: ${this.fmtB(total)} / ${this.fmtB(C.MAX_TOTAL_SIZE)}`;
        }
      },

      handleTextChange(e) {
        const t = e.target.value;
        try {
          const bytes = new TextEncoder().encode(t).length;
          if (bytes > C.MAX_TEXT_LENGTH) {
            showAlert("Text exceeds byte limit");
            e.target.value = this.s.textInput;
            return;
          }
        } catch (e) {
          if (t.length > C.MAX_TEXT_LENGTH) {
            showAlert("Text exceeds limit"); e.target.value = this.s.textInput; return;
          }
        }
        this.s.textInput = t;
        this.updateCharCount();
        this.updateTotalSize();
        this.resetInact();
      },

      handleFileChange(e) {
        if (!e.target.files || !e.target.files.length) return;
        const nf = Array.from(e.target.files);
        const over = nf.filter(f => f.size > C.MAX_FILE_SIZE);
        if (over.length) {
          showAlert(`Files exceed ${this.fmtB(C.MAX_FILE_SIZE)}: ${over.map(f => this.esc(f.name)).join(', ')}`);
          e.target.value = '';
          return;
        }
        const cur = this.s.files.reduce((a, f) => a + f.size, 0);
        const ns = nf.reduce((a, f) => a + f.size, 0);
        if (cur + ns > C.MAX_TOTAL_SIZE) {
          showAlert("Total exceeds 1GB");
          e.target.value = '';
          return;
        }
        
        try {
          const existing = new Set((this.s.files || []).map(f => `${f.name}:${f.size}:${f.lastModified || 0}`));
          const toAdd = [];
          for (const f of nf) {
            const key = `${f.name}:${f.size}:${f.lastModified || 0}`;
            if (!existing.has(key)) { existing.add(key); toAdd.push(f); }
          }
          if (toAdd.length) this.s.files = (this.s.files || []).concat(toAdd);
        } catch (e) {
          this.s.files = (this.s.files || []).concat(nf);
        }
        e.target.value = '';
        this.renderEnc();
        this.resetInact();
      },

      async preGeneratePD() {
        try {
          const items = await this.prepareItems();
          const manifest = {
            manifestId: this.rid(16),
            encodedItems: [],
            iterations: this.s.iterations,
            hashAlgorithm: this.s.hashAlgorithm,
            totalItems: items.length,
            totalChunks: 0,
            totalSize: items.reduce((s, it) => s + it.blob.size, 0),
            compressed: this.s.compress,
            keyType: 'symmetric'
          };
          let globalIndex = 0;
          for (const it of items) {
            const fileSize = it.blob.size;
            const chunkCount = Math.ceil(fileSize / C.CHUNK_SIZE) || 1;
            const chunkIds = [];
            for (let ci = 0; ci < chunkCount; ci++) {
              chunkIds.push({ id: this.rid(12), chunkIndex: ci, globalIndex: globalIndex++ });
            }
            manifest.encodedItems.push({ dataItemId: this.rid(8), fileSize, chunkCount, chunkIds, name: it.name, type: it.type });
            manifest.totalChunks += chunkCount;
          }

          await this.generateDecoys(manifest, null);
          this.renderEnc();
        } catch (e) {
          dbg('preGeneratePD failed', e);
        }
      },

      handleCompressChange(e) { this.s.compress = e.target.checked; this.resetInact(); },

      checkStrength(p) {
        if (p.length < 12) return 'weak';
        if (/[a-zA-Z]/.test(p) && /\d/.test(p) && /[^a-zA-Z0-9]/.test(p)) return 'strong';
        return 'medium';
      },

      estSize(tc) { return tc * C.CHUNK_SIZE * 1.33 + 10000; },

      async copyClip(txt, okMsg, errMsg = "Copy failed") {
        try {
          
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(txt);
            showAlert(okMsg);
            return;
          }
        } catch (e) {
          
        }
        
        
        const ta = document.createElement('textarea');
        ta.id = 'clipboard-textarea';
        ta.name = 'clipboard-textarea';
        ta.value = txt;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        ta.style.top = '-9999px';
        ta.setAttribute('readonly', '');
        document.body.appendChild(ta);
        
        try {
          ta.select();
          ta.setSelectionRange(0, txt.length);
          const success = document.execCommand('copy');
          document.body.removeChild(ta);
          
          if (success) {
            showAlert(okMsg);
          } else {
            showAlert(errMsg + ' - please select and copy manually');
          }
        } catch (e) {
          document.body.removeChild(ta);
          showAlert(errMsg + ' - please select and copy manually');
        }
      },

      async copyManifest() {
        if (!this.s.manifest) return showAlert("No manifest");
        const size = JSON.stringify(this.s.manifest).length;
        if (size > 10000000) return showAlert("Manifest too large for clipboard. Download instead.");
        await this.copyClip(JSON.stringify(this.s.manifest, null, 2), "Manifest copied to clipboard");
      },

      async copyBundle() {
        if (!this.s.chunkBundleBatches) return showAlert("No bundle");
        if (this.s.chunkBundleBatches.length > 1) return showAlert("Copy not supported for batched bundles.");
        const size = JSON.stringify(this.s.chunkBundleBatches[0]).length;
        if (size > 10000000) return showAlert("Bundle too large for clipboard.");
        await this.copyClip(JSON.stringify(this.s.chunkBundleBatches[0], null, 2), "Bundle copied to clipboard");
      },

      async copyCombined() {
        if (!this.s.manifest || !this.s.chunkBundleBatches) return showAlert("No data");
        if (this.s.chunkBundleBatches.length > 1) return showAlert("Copy not supported for batched data.");
        const comb = { manifest: this.s.manifest, bundle: this.s.chunkBundleBatches[0] };
        const size = JSON.stringify(comb).length;
        if (size > 10000000) return showAlert("Combined too large for clipboard.");
        await this.copyClip(JSON.stringify(comb, null, 2), "Combined copied to clipboard");
      },

      dlBundle() {
        if (!this.s.chunkBundleBatches) return;
        this.s.chunkBundleBatches.forEach((b, i) => {
          const blob = new Blob([JSON.stringify(b, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = this.s.chunkBundleBatches.length > 1 ? `zd_bundle_part${i}.json` : "zd_bundle.json";
          document.body.appendChild(a);
          a.click();
          a.remove();
          
          try {
            this.s.blobUrls = this.s.blobUrls || [];
            this.s.blobUrls.push(url);
            const _t = setTimeout(() => { try { URL.revokeObjectURL(url); } catch(e){} }, 10000);
            this.s.revocationTimers = this.s.revocationTimers || [];
            this.s.revocationTimers.push(_t);
          } catch(e) {}
        });
      },

      dlManifest() {
        if (!this.s.manifest) return;

          this.s.revocationTimers = this.s.revocationTimers || [];
          this.s.revocationTimers.push(_t);
        } catch(e) {}
      },

      dlCombined() {
        if (this.s.chunkBundleBatches?.length !== 1) return;
        const comb = { manifest: this.s.manifest, bundle: this.s.chunkBundleBatches[0] };
        const blob = new Blob([JSON.stringify(comb, null, 2)], { type: 'application/json' });

          this.s.revocationTimers = this.s.revocationTimers || [];
          this.s.revocationTimers.push(_t);
        } catch(e) {}
      },

      savePDDownloads() {
        if (!this.s.pdDownloads || !this.s.pdDownloads.length) return showAlert('No decoy files available');
        try {
          for (const d of this.s.pdDownloads) {
            const a = document.createElement('a');
            a.href = d.url;
            a.download = d.name;
            document.body.appendChild(a);
            a.click();
            a.remove();
          }
          showAlert('Decoy downloads started');

          setTimeout(() => {
            this.s.pdDownloads.forEach(p => URL.revokeObjectURL(p.url));
            this.s.pdDownloads = [];
            this.s.pdPassphrases = [];
            this.s.pdReady = false;
            this.renderEnc();
          }, 10000);
        } catch (e) {
          dbg('savePDDownloads failed', e);
          showAlert('Decoy download failed — use the manual links');
        }
      },

      async importBundle() {
        try {
          if (!this.s.encryptedChunksMap) this.s.encryptedChunksMap = new Map();
          let added = 0;
          if (this.s.chunkBundleInput.trim()) {
            const b = this.valJSON(this.s.chunkBundleInput, 'bundle');
            b.chunks.forEach(c => this.s.encryptedChunksMap.set(c.chunkId, { cipher: c.cipher, salt: c.salt, iv: c.iv }));
            added += b.chunks.length;
            this.s.chunkBundleInput = '';
          }
          for (const file of this.s.chunkBundleFiles) {
            const txt = await file.text();
            const b = this.valJSON(txt, 'bundle');
            b.chunks.forEach(c => this.s.encryptedChunksMap.set(c.chunkId, { cipher: c.cipher, salt: c.salt, iv: c.iv }));
            added += b.chunks.length;
          }
          this.s.chunkBundleFiles = [];
          if (added) showAlert(`Loaded ${added} encrypted chunks`);
          else showAlert("No bundle data");
          this.renderDec();
          this.resetInact();
        } catch (e) {
          showAlert("Bundle error: " + e.message);
        }
      },

      async importManifest() {
        try {
          let txt;
          if (this.s.manifestFile) txt = await this.s.manifestFile.text();
          else if (this.s.manifestInput.trim()) txt = this.s.manifestInput;
          else return showAlert("Provide manifest");
          const p = this.valJSON(txt, 'manifest');
          this.s.manifestJson = txt;
          this.s.parsedManifest = p;
          this.s.decAsymmetricMode = p.keyType === 'ecdh';
          this.s.manifestValid = true;
          showAlert(`Manifest loaded: ${p.totalItems} items, ${p.totalChunks} chunks${p.keyType === 'ecdh' ? ' (Asymmetric)' : ''}`);
          this.renderDec();
          this.resetInact();
        } catch (e) {
          showAlert("Manifest error: " + e.message);
          this.s.decAsymmetricMode = false;
        }
      },

      async importCombined() {
        try {
          let txt;
          let isFile = false;
          if (this.s.combinedFile) {
            isFile = true;
            
            if (this.s.combinedFile.name.endsWith('.bin') || this.s.combinedFile.name.endsWith('.exe')) {
              try {
                await this.importHiddenVolumeContainer(this.s.combinedFile);
                return;
              } catch (hvErr) {
                
                showAlert('Failed to import as hidden volume: ' + hvErr.message);
                return;
              }
            }
            txt = await this.s.combinedFile.text();
          }
          else if (this.s.combinedInput.trim()) txt = this.s.combinedInput;
          else return showAlert("Provide combined file");
          
          const c = JSON.parse(txt);

      async getEncryptionKey(isAsymmetric) {
        if (isAsymmetric) {

            this.s.plausibleDeniability = false;
          }
          let pubs = [];
          if (this.s.multiRecipient) {
            pubs = this.s.receiverPubKeys.map(k => k.trim()).filter(k => k);
          } else {
            const single = this.s.receiverPubInput.trim();
            if (single) pubs = [single];
          }
          if (pubs.length === 0) throw new Error("No public keys");
          const sessionKey = await crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']);
          let sessionRaw = await crypto.subtle.exportKey('raw', sessionKey);
          const recipients = [];
          for (const pubB64 of pubs) {
            const receiverPub = await this.importKey(pubB64, this.s.curve, true);
            const senderKp = await this.genKeyPair(this.s.curve);
            const shared = await this.deriveSharedKey(senderKp.privateKey, receiverPub);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, shared, sessionRaw);
            const senderPubB64 = await this.exportKey(senderKp.publicKey);
            recipients.push({
              senderPublic: senderPubB64,
              encryptedSession: { cipher: this.ab2b64(cipher), iv: this.ab2b64(iv) }
            });
            try { senderKp.privateKey = null; } catch(e){}
          }
          
          try { Scrub.wipe(sessionRaw); } catch(e) {}
          sessionRaw = null;
          return { key: sessionKey, extras: { keyType: 'ecdh', curve: this.s.curve, recipients } };
        } else {
          return { key: this.s.passphrase, extras: { iterations: this.s.iterations, hashAlgorithm: this.s.hashAlgorithm } };
        }
      },

        };

      generateDecoyTextByType(fileType, targetSize, bias = 'note') {
        try {
          const type = (fileType || 'txt').toLowerCase();
          const enc = new TextEncoder();
          const padTo = (text) => {
            let bytes = enc.encode(text);
            if (bytes.length > targetSize) bytes = bytes.subarray(0, targetSize);
            if (bytes.length < targetSize) {
              const out = new Uint8Array(targetSize);
              out.set(bytes, 0);
              for (let i = bytes.length; i < targetSize; i++) out[i] = 0x20;
              bytes = out;
            }
            return new Blob([bytes], { type: 'text/plain' });
          };

          if (type === 'csv' || type === 'tsv') {
            const delim = type === 'tsv' ? '\t' : ',';
            const cols = 4 + Math.floor(CryptoRNG.get() * 5);
            const rows = Math.max(8, Math.floor(targetSize / (cols * 12)));
            const headers = Array.from({ length: cols }, () => this.generatePlausibleText(2).split(/\s+/)[0]);
            let out = headers.join(delim) + '\n';
            for (let r = 0; r < rows; r++) {
              const row = [];
              for (let c = 0; c < cols; c++) {
                row.push(CryptoRNG.get() > 0.5 ? this.generatePlausibleText(2).split(/\s+/)[0] : String(Math.floor(CryptoRNG.get() * 10000)));
              }
              out += row.join(delim) + '\n';
            }
            return padTo(out);
          }

          if (type === 'ini') {
            const sections = ['general','network','display','security','backup','sync','ui','system'];
            let out = '; configuration\n';
            for (let i = 0; i < 4 + Math.floor(CryptoRNG.get() * 4); i++) {
              out += `\n[${sections[Math.floor(CryptoRNG.get() * sections.length)]}]\n`;
              for (let j = 0; j < 3 + Math.floor(CryptoRNG.get() * 5); j++) {
                out += `${this.generatePlausibleText(2).split(/\s+/)[0]}=${this.generatePlausibleText(3).replace(/\s+/g,'_')}\n`;
              }
            }
            return padTo(out);
          }

          if (type === 'yaml' || type === 'yml') {
            let out = '---\n';
            out += `title: ${this.generatePlausibleText(4)}\n`;
            out += `created: 2020-01-01T00:00:00Z\n`;
            out += 'items:\n';
            const count = 6 + Math.floor(CryptoRNG.get() * 8);
            for (let i = 0; i < count; i++) {
              out += `  - id: ${this.rid(6)}\n`;
              out += `    name: ${this.generatePlausibleText(2)}\n`;
              out += `    note: ${this.generatePlausibleText(8).replace(/\n/g,' ')}\n`;
            }
            return padTo(out);
          }

          if (type === 'xml') {
            let out = '<?xml version="1.0" encoding="UTF-8"?>\n<records>\n';
            const count = 8 + Math.floor(CryptoRNG.get() * 12);
            for (let i = 0; i < count; i++) {
              out += `  <record id="${this.rid(6)}">\n`;
              out += `    <title>${this.esc(this.generatePlausibleText(3))}</title>\n`;
              out += `    <value>${Math.floor(CryptoRNG.get() * 10000)}</value>\n`;
              out += `    <note>${this.esc(this.generatePlausibleText(10).replace(/\n/g,' '))}</note>\n`;
              out += '  </record>\n';
            }
            out += '</records>\n';
            return padTo(out);
          }

          if (type === 'md') {
            let out = `# ${this.generatePlausibleText(4)}\n\n`;
            out += `> ${this.generatePlausibleText(12).replace(/\n/g,' ')}\n\n`;
            out += '## Notes\n\n';
            out += this.generatePlausibleText(200) + '\n\n';
            out += '## Tasks\n\n';
            for (let i = 0; i < 6 + Math.floor(CryptoRNG.get() * 6); i++) {
              out += `- [${CryptoRNG.get() > 0.6 ? 'x' : ' '}] ${this.generatePlausibleText(6).replace(/\n/g,' ')}\n`;
            }
            out += '\n```\n' + this.generatePlausibleText(120).replace(/\n/g,' ') + '\n```\n';
            return padTo(out);
          }

          if (type === 'log') {
            let out = '';
            const lines = 20 + Math.floor(CryptoRNG.get() * 40);
            const levels = ['INFO','WARN','ERROR','DEBUG'];
            for (let i = 0; i < lines; i++) {
              const dayOffset = Math.floor(CryptoRNG.get() * 7);
              const ts = `2020-01-${String(1 + dayOffset).padStart(2,'0')}T${String(Math.floor(CryptoRNG.get()*24)).padStart(2,'0')}:${String(Math.floor(CryptoRNG.get()*60)).padStart(2,'0')}:${String(Math.floor(CryptoRNG.get()*60)).padStart(2,'0')}.000Z`;
              out += `${ts} ${levels[Math.floor(CryptoRNG.get() * levels.length)]} ${this.generatePlausibleText(10).replace(/\n/g,' ')}\n`;
            }
            return padTo(out);
          }

          
          const base = this.generatePlausibleText(targetSize > 1200 ? 800 : 240);
          const extra = this.generatePlausibleText(120 + Math.floor(CryptoRNG.get() * 200));
          return padTo(`${base}\n\n${extra}`);
        } catch (e) {
          return new Blob([this.generatePlausibleText(Math.max(64, Math.min(targetSize, 400)))], { type: 'text/plain' });
        }
      },

      generateSimpleDecoyFileName(fileType, namingStyle = 'realistic') {
        const type = (fileType || 'bin').toLowerCase();

          pdf: 'pdf', doc: 'doc', docx: 'docx', pptx: 'pptx', xlsx: 'xlsx',
          jpg: 'jpg', jpeg: 'jpg', png: 'png', gif: 'gif', webp: 'webp',
          audio: 'wav', video: 'webm', json: 'json', html: 'html', css: 'css', js: 'js',
          txt: 'txt', md: 'md', log: 'log', csv: 'csv', tsv: 'tsv', ini: 'ini', yaml: 'yaml', yml: 'yml', xml: 'xml', zip: 'zip'
        };
        const extension = extMap[type] || 'bin';

        const baseSets = {
          professional: ['report', 'summary', 'proposal', 'analysis', 'invoice', 'statement', 'brief', 'spec'],
          casual: ['photo', 'notes', 'idea', 'journal', 'weekend', 'trip', 'family', 'snapshot'],
          technical: ['log', 'config', 'dump', 'trace', 'build', 'release', 'changelog', 'metrics'],
          realistic: ['document', 'file', 'data', 'report', 'project', 'backup', 'archive', 'record'],
          mixed: ['document', 'notes', 'report', 'photo', 'summary', 'draft', 'final', 'scan']
        };
        const baseName = (baseSets[namingStyle] || baseSets.realistic)[Math.floor(CryptoRNG.get() * (baseSets[namingStyle] || baseSets.realistic).length)];
        const year = 2020;
        const month = 1 + Math.floor(CryptoRNG.get() * 12);
        const day = 1 + Math.floor(CryptoRNG.get() * 28);
        const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const variants = [
          () => `${baseName}_${this.rid(6).toLowerCase()}`,
          () => `${baseName}_${dateStr}`,
          () => `${baseName}_${dateStr}_${this.rid(4).toLowerCase()}`,
          () => `${baseName}-${String(Math.floor(CryptoRNG.get()*9999)).padStart(4,'0')}`,
          () => `${baseName}_${this.generateRealisticFileName()}`,
          () => `${this.generateRealisticFileName()}_${baseName}`
        ];
        const stem = variants[Math.floor(CryptoRNG.get() * variants.length)]();
        return `${stem}.${extension}`;
      },

      
      generateRealisticFileName() {

          () => {

            const month = 1 + Math.floor(CryptoRNG.get() * 12);
            const day = 1 + Math.floor(CryptoRNG.get() * 28);
            const hour = Math.floor(CryptoRNG.get() * 24);
            const minute = Math.floor(CryptoRNG.get() * 60);
            return `${year}${String(month).padStart(2, '0')}${String(day).padStart(2, '0')}_${String(hour).padStart(2, '0')}${String(minute).padStart(2, '0')}`;
          },
          
          () => this.rid(8).toLowerCase(),
          
          () => {
            const words = ['project', 'system', 'data', 'file', 'work', 'home', 'office', 'personal', 'backup', 'temp'];
            return words[Math.floor(CryptoRNG.get() * words.length)] + '_' + this.rid(4).toLowerCase();
          },
          
          () => {
            const num = Math.floor(CryptoRNG.get() * 9999) + 1;
            return String(num).padStart(4, '0');
          }
        ];
        
        return patterns[Math.floor(CryptoRNG.get() * patterns.length)]();
      },

          const minDuration = Math.max((opts.minDuration || 1) * 1000, 1200);
          const duration = Math.min(8000, Math.max(minDuration, Math.floor(targetSize / 20000) * 500 + minDuration));
          const frameCount = Math.max(2, Math.ceil((duration / 1000) * fps));

          const canvas = document.createElement('canvas'); 
          canvas.width = w; 
          canvas.height = h;
          canvas.style.position = 'fixed'; 
          canvas.style.left = '-9999px'; 
          canvas.style.top = '0px';
          document.body.appendChild(canvas);

          try {
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const testCaptureFps = Math.max(1, Math.min(4, fps || 8));
            const stream = canvas.captureStream(testCaptureFps);
            
            const mimeCandidates = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
            let recorder = null; 
            let chosenMime = '';
            for (const m of mimeCandidates) {
              try {
                if (!MediaRecorder.isTypeSupported || MediaRecorder.isTypeSupported(m)) {
                  recorder = new MediaRecorder(stream, { mimeType: m });
                  chosenMime = m; 
                  break;
                }
              } catch (e) { continue; }
            }
            
            if (!recorder) {
              
              const gif = await this.generateSimpleAnimatedGif(Math.max(32768, targetSize), w, h, Math.max(2, frameCount));
              document.body.removeChild(canvas);
              return gif;
            }

            const chunks = [];
            recorder.ondataavailable = ev => { 
              if (ev.data && ev.data.size) { 
                chunks.push(ev.data); 
              } 
            };

            recorder.start(250);

            
            const frameInterval = 1000 / testCaptureFps;
            let frameTime = 0;
            
            for (let i = 0; i < frameCount; i++) {
              
              ctx.fillStyle = `hsl(${CryptoRNG.get() * 360}, 70%, 50%)`;
              ctx.fillRect(0, 0, w, h);
              
              
              for (let j = 0; j < 5; j++) {
                ctx.fillStyle = `hsl(${CryptoRNG.get() * 360}, 70%, 70%)`;
                ctx.beginPath();
                ctx.arc(
                  CryptoRNG.get() * w, 
                  CryptoRNG.get() * h, 
                  10 + CryptoRNG.get() * 30, 
                  0, 
                  Math.PI * 2
                );
                ctx.fill();
              }
              
              
              await new Promise(resolve => setTimeout(resolve, frameInterval));
            }

            
            recorder.stop();
            
            
            await new Promise(resolve => {
              recorder.onstop = resolve;
              setTimeout(resolve, 1000);

          } catch (e) {

          }

      async encryptItemsWithKey(items, key, isAsymmetric) {
        if (!items || !Array.isArray(items) || items.length === 0) {
          throw new Error('Items array cannot be empty');
        }
        
        const bundle = { chunks: [] };
        let totalChunks = 0;
        let proc = 0;
        let encoded = [];
        
        for (const item of items) {
          let blobToUse = item.blob;
          let itemSize = blobToUse.size;
          
          if (this.s.compress) {
            blobToUse = await this.compressBlob(blobToUse);
            itemSize = blobToUse.size;
          }
          
          const chunkSize = C.CHUNK_SIZE;
          const chunkCount = Math.ceil(itemSize / chunkSize);
          totalChunks += chunkCount;
          
          for (let i = 0; i < chunkCount; i++) {
            const start = i * chunkSize;
            const end = Math.min(start + chunkSize, itemSize);
            const chunk = blobToUse.slice(start, end);
            const encChunk = await this.encChunk(new Uint8Array(await chunk.arrayBuffer()), key, isAsymmetric);
            const cid = this.rid(8);
            
            const encChunkSize = JSON.stringify(encChunk).length;
            bundle.chunks.push({ cid, size: encChunkSize });
            encoded.push({ cid, data: encChunk, item: item.name, chunk: i + 1, total: chunkCount });
          }
        }
        
        return { bundle, encoded, totalChunks };
      },

          const chunkJson = JSON.stringify({

            data: chunk.data,
            item: chunk.item,
            chunk: chunk.chunk,
            total: chunk.total
          });
          size += chunkJson.length + 100; 
        }
        
        return Math.ceil(size * 1.2);
      },

      extractContainerFromArray(u8) {
        try {
          if (!(u8 instanceof Uint8Array)) u8 = new Uint8Array(u8);
          if (u8.length < 12) return null;
          const footerStart = u8.length - 12;
          const magic = String.fromCharCode(...u8.slice(footerStart, footerStart + 4));
          if (magic !== 'ZDDC') return null;
          const dv = new DataView(u8.buffer, footerStart + 4, 8);
          const len = Number(dv.getBigUint64(0,true));
          const containerStart = footerStart - len;
          if (containerStart < 0) return null;
          return u8.slice(containerStart, containerStart + len);
        } catch (e) { return null; }

      async reconstructFilesFromChunks(chunks, manifest) {
        const files = [];
        const chunksByItem = new Map();
        
        
        for (const chunk of chunks) {
          if (!chunksByItem.has(chunk.item)) {
            chunksByItem.set(chunk.item, []);
          }
          chunksByItem.get(chunk.item).push(chunk);
        }
        
        
        for (const [itemName, itemChunks] of chunksByItem) {
          
          itemChunks.sort((a, b) => {
            const aNum = a.chunk || 0;
            const bNum = b.chunk || 0;
            return aNum - bNum;
          });
          
          
          const allData = [];
          for (const chunk of itemChunks) {
            allData.push(chunk.data);
          }
          
          const combinedData = new Uint8Array(allData.reduce((sum, arr) => sum + arr.length, 0));
          let offset = 0;
          for (const data of allData) {
            combinedData.set(data, offset);
            offset += data.length;
          }
          
          const blob = new Blob([combinedData]);
          const url = URL.createObjectURL(blob);
          
          files.push({
            name: itemName,
            blob: blob,
            url: url,
            size: blob.size,
            type: blob.type || 'application/octet-stream'
          });
        }
        
        return files;
      },

      async toggleViewDec(i) {
        const f = this.s.decodedFiles[i];
        if (!this.s.viewedTexts[i]) this.s.viewedTexts[i] = { showing: false, text: null };
        const v = this.s.viewedTexts[i];
        v.showing = !v.showing;
        if (v.showing && v.text === null) v.text = await f.blob.text();

      startPurge() {
        if (this.s.purgeTimer) clearInterval(this.s.purgeTimer);
        this.s.remainingTime = C.PURGE_DELAY;
        this.s.sessionStartTime = performance.now();
        this.updateCountdown();
        this.s.purgeTimer = setInterval(() => {
          const elapsed = (performance.now() - this.s.sessionStartTime) / 1000;
          this.s.remainingTime = Math.max(0, C.PURGE_DELAY - Math.floor(elapsed));
          this.updateCountdown();
          if (this.s.remainingTime <= 0) {
            clearInterval(this.s.purgeTimer);
            this.s.purgeTimer = null;
            this.doCleanup();
          }
        }, 1000);
      },

      updateCountdown() {
        const el = document.getElementById('countdown');
        if (el) {
          el.textContent = this.s.remainingTime;
          el.className = this.s.remainingTime <= 10 ? 'timer-red' : '';
        }
      },

      startInact() {
        
        try { if (this.stopInact) this.stopInact(); } catch (e) {}
        this.resetInact();
        const events = ['mousemove', 'keydown', 'click', 'scroll', 'touchstart', 'blur'];
        events.forEach(evt => {
          if (evt === 'blur') {
            try { window.addEventListener(evt, Scrub.keepPressure); } catch (e) {}
          } else {
            try { document.addEventListener(evt, this.boundReset, { passive: true }); } catch (e) { try { document.addEventListener(evt, this.boundReset); } catch(e){} }
          }
        });
      },

      stopInact() {
        try {
          const events = ['mousemove', 'keydown', 'click', 'scroll', 'touchstart', 'blur'];
          events.forEach(evt => {
            try {
              if (evt === 'blur') window.removeEventListener(evt, Scrub.keepPressure);
              else document.removeEventListener(evt, this.boundReset);
            } catch (e) {}
          });
        } catch (e) {}
        try { if (this.s.inactivityTimer) { clearTimeout(this.s.inactivityTimer); this.s.inactivityTimer = null; } } catch(e){}
      },

      resetInact() {
        if (this.s.inactivityTimer) clearTimeout(this.s.inactivityTimer);
        this.s.inactivityTimer = setTimeout(() => this.doCleanup(), C.INACTIVITY_TIMEOUT * 1000);
      },

      boundReset: null,

      handleCleanup() {
        showConfirm('Purge all decrypted data?', () => Scrub.nukeEverything());
      },

        for (let i = 0; i < this.s.chunkBundleFiles.length; i++) h += `<div class="list-item"><span class="list-item-content">${this.esc(this.s.chunkBundleFiles[i].name)}</span><button type="button" id="remove-bundle-file-${i}" class="button-primary" onclick="Z.removeBunFile(${i})" aria-label="Remove bundle file ${i + 1}">Remove</button></div>`;
        h += `<label for="bundle-input" class="sr-only">Or paste bundle JSON</label><textarea id="bundle-input" name="bundle-input" class="input-text-area" placeholder="Or paste bundle JSON" oninput="Z.handleBunChange(event)" rows="3">${this.esc(this.s.chunkBundleInput)}</textarea>`;

        if (this.s.manifestFile) h += `<div class="list-item"><span class="list-item-content">${this.esc(this.s.manifestFile.name)}</span><button type="button" id="remove-manifest-file-btn" class="button-primary" onclick="Z.removeManFile()" aria-label="Remove manifest file">Remove</button></div>`;

        if (this.s.isDecoding) {
          h += `<div class="flex items-center"><div class="loading-spinner"></div><span>${this.s.currentStatus || 'Processing...'}</span><span id="decTimer" class="timer-display">${this.esc(this.s.decTimerText || 'Elapsed: 00:00')}</span></div>`;

        }
        if (this.s.decodedFiles && this.s.decodedFiles.length) {

            if (f.type && f.type.startsWith('image/')) {

            }
            h += `</div></div>`;
            if (this.s.viewedTexts[i]?.showing) h += `<pre>${this.esc(this.s.viewedTexts[i].text || 'Loading...')}</pre>`;
          }
          h += `<p class="text-sm">Auto-purge in <span id="countdown">${this.s.remainingTime}</span>s</p>`;
          h += '<button type="button" id="purge-now-btn" class="button-primary" onclick="Z.handleCleanup()" aria-label="Purge decrypted data now">Purge Now</button>';
